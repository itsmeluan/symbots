name: Automated Tests

# Runs the GUT (Godot Unit Testing) suite on every push to main and every PR.
# A failed suite blocks merging — GUT's command-line runner exits non-zero on any
# test failure. Framework choice + command match .claude/docs/coding-standards.md
# and .claude/docs/technical-preferences.md (GUT, NOT gdUnit4).

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    name: Run GUT Tests
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          lfs: true

      # Installs the Godot 4.7 headless binary. GDScript-only project → no .NET.
      # Version pinned to docs/engine-reference/godot/VERSION.md (re-pinned
      # 4.6 → 4.7 on 2026-07-15 to match the installed 4.7.stable.official
      # toolchain; 4.7-stable released 2026-06-18). The action takes GodotSharp
      # NuGet-style version strings, where "4.7.0" == 4.7 STABLE (pre-releases
      # carry a suffix, e.g. "4.7.0-rc.1"). Verify against VERSION.md when bumping.
      - name: Set up Godot 4.7
        uses: chickensoft-games/setup-godot@v2
        with:
          version: "4.7.0"
          use-dotnet: false
          include-templates: false

      # Import step builds the resource cache so the runner can resolve res:// paths.
      # Godot exits non-zero on a clean headless import with no main scene, so this
      # is best-effort and must not fail the job.
      - name: Import resources
        run: godot --headless --import
        continue-on-error: true

      # Discovery config (dirs + the project's `_test.gd` suffix convention) lives
      # in .gutconfig.json. The bare -gdir form uses GUT's default `test_` PREFIX,
      # which does NOT match this project's `[system]_[feature]_test.gd` naming —
      # so the config is the single source of truth for both CI and local runs.
      - name: Run GUT tests
        run: godot --headless -s addons/gut/gut_cmdln.gd -gconfig=.gutconfig.json

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: gut-test-results
          path: |
            reports/
            *.xml
          if-no-files-found: ignore
