# Game World Entity Registry
#
# PURPOSE: Single source of truth for all named game-world facts that appear
# in more than one document. Skills check this before writing new content to
# detect cross-doc inconsistencies at authoring time.
#
# RULES:
#   - Only register facts that cross system boundaries. Internal-only facts
#     (a formula used in one GDD only) do NOT need to be registered.
#   - Never delete entries — set status: deprecated instead.
#   - When a value changes: update the value, set revised: to today's date,
#     and add a comment with the old value and which GDD changed it.
#   - source: is the authoritative GDD — the one that "owns" this fact.
#     Other GDDs that reference it list themselves in referenced_by.
#   - When a new GDD references an existing entry, append its path to
#     referenced_by. Do not create a duplicate entry.
#
# WRITTEN BY: /design-system (Phase 5 — after GDD sections are approved)
#             /consistency-check (when resolving conflicts)
# READ BY:    /design-system (Phase 2 — before authoring begins, and after
#               Section C/D writes to conflict-check new entities/formulas)
#             /consistency-check (primary input — grep-first, GDD-second)
#             /review-all-gdds (Phase 1 — baseline for Phase 2 checks)
#             /architecture-review (data structure and interface validation)
#
# SEARCH PATTERNS (for skills using Grep):
#   All entity names:        Grep pattern="^  - name:" path="design/registry/entities.yaml"
#   Specific entity:         Grep pattern="  - name: goblin" path="design/registry/entities.yaml"
#   All items:               Grep pattern="^  - name:" path="design/registry/entities.yaml" (items section)
#   What combat.md owns:     Grep pattern="source: design/gdd/combat.md"
#   What inventory.md uses:  Grep pattern="referenced_by.*inventory"
#   All gold values:          Grep pattern="value_gold:"
#   Deprecated entries:      Grep pattern="status: deprecated"
#
# FORMAT: YAML. Consistent indentation is critical for grep reliability.
#   Sections: entities | items | formulas | constants
#   Each entry: name, status, source, referenced_by[], attributes{}, added, revised

version: 1
last_updated: "2026-07-10"

# ─── ENTITIES ────────────────────────────────────────────────────────────────
# Named game-world objects: enemies, NPCs, characters, factions, bosses.
# Register an entity here when it appears in more than one GDD — e.g., an
# enemy defined in combat.md that also drops items listed in inventory.md.
#
# Required fields: name, status, source, referenced_by, added
# Attribute fields: any key stats that could appear in another GDD
#   (health, damage, drops, faction, etc.)

entities: []

# Example (remove when first real entry is added):
#
# entities:
#   - name: goblin
#     status: active              # active | deprecated
#     source: design/gdd/combat.md
#     referenced_by:
#       - design/gdd/combat.md
#       - design/gdd/inventory.md
#     health: 40
#     damage: 8
#     drops:
#       - item: goblin_arm        # must match an entry in items section
#         qty: 1
#         drop_rate: 0.8          # 0.0–1.0
#     added: 2026-03-26
#     revised: ""


# ─── ITEMS ───────────────────────────────────────────────────────────────────
# Named collectables, equipment, consumables, crafting materials, currency.
# Register an item when its name or value appears in more than one GDD.
#
# Required fields: name, status, source, referenced_by, added
# Attribute fields: value_gold, weight, stackable, category, and any stat
#   modifiers that another system (e.g., economy, crafting) might reference.

items: []

# Example:
#
# items:
#   - name: goblin_arm
#     status: active
#     source: design/gdd/combat.md   # drop defined in combat GDD
#     referenced_by:
#       - design/gdd/combat.md
#       - design/gdd/inventory.md    # inventory GDD lists its weight/stack rules
#       - design/gdd/economy.md      # economy GDD references its sell price
#     value_gold: 5
#     weight: 1
#     stackable: true
#     category: crafting_material
#     added: 2026-03-26
#     revised: ""


# ─── FORMULAS ────────────────────────────────────────────────────────────────
# Named calculations with defined variables and output ranges.
# Register a formula when its output feeds into another system's input,
# or when another GDD references it by name.
#
# Required fields: name, status, source, referenced_by, variables[],
#   output_range[min, max], added
# Optional: expression (the actual formula), notes

formulas:
  - name: SA-F1
    status: active
    source: design/gdd/symbot-assembly.md
    referenced_by:
      - design/gdd/symbot-assembly.md
    variables:
      - stat_bonuses (per-part flat integer, from SympartData)
      - upgrade_tier (0–5, per-part)
      - chassis_archetype_modifier (multiplier from Rule 3 table, per stat)
      - stat_key (one of the 11 stat names)
    output_range:
      structure: [60, 594]
      armor: [0, 132]
      resistance: [0, 132]
      physical_power: [0, 110]
      energy_power: [0, 110]
      mobility: [0, 96]
      targeting: [0, 110]
      processing: [0, 110]
      cooling: [0, 110]
      energy_capacity: [80, 120]
      recharge: [0, 30]
    expression: |
      step1: part_stat = F2(stat_bonuses, upgrade_tier)   # positive bonus
             part_stat = F2b(stat_bonuses, upgrade_tier)  # negative bonus
      step2: raw = sum(part_stat for all 8 parts, per stat_key)
      step3: modified = raw * chassis_archetype_modifier.get(stat_key, 1.0)
      step4: final_stat[stat_key] = max(0, floor(modified + 0.0001))
    notes: "Owns the 4-step stat derivation pipeline. Synergy bonus is added
      AFTER this pipeline by the Synergy System — not included in final_stat.
      Stats are uncapped above — output_range values are content-authoring targets,
      not formula-enforced limits (EC-SA-06 explicitly allows recharge > 30).
      Epsilon nudge in F2b is LOAD-BEARING (e.g. base=-15 tier+2:
      15 * (2/3) = 5.000000000000001 in IEEE 754; ceil without -0.0001 returns
      6 → result -6 (wrong); with epsilon: ceil(4.9999...) = 5 → result -5 (correct)).
      output_range[recharge] max is 30 as authoring target only; values above 30
      are possible via content error and are logged but not clamped (EC-SA-06)."
    added: 2026-07-10
    revised: "2026-07-10"  # corrected step3 (removed erroneous floor), step4 (removed stat_max ref), epsilon example, and range notes

  - name: SA-F2
    status: active
    source: design/gdd/symbot-assembly.md
    referenced_by:
      - design/gdd/symbot-assembly.md
    variables:
      - target_slot (the slot being previewed)
      - candidate_part (SympartData not yet equipped)
      - current_build (SymbotBuild, unmodified)
    output_range: "delta per stat — negative = decrease, positive = increase; magnitude bounded by SA-F1 output ranges"
    expression: |
      hypothetical = run SA-F1 with candidate_part replacing current_build.parts[target_slot]
      delta[stat_key] = hypothetical[stat_key] - current_build.final_stat[stat_key]
      (Chassis swap note: changes all 11 stats via modifier table re-application,
       even for stats with candidate.stat_bonuses[key]=0)
    notes: "Read-only — no signals, no Inventory change, no slot write. Synergy
      excluded: delta is base-stats only. Used by Workshop UI for live stat preview."
    added: 2026-07-10
    revised: ""

  - name: EDB-1
    status: active
    source: design/gdd/enemy-database.md
    referenced_by:
      - design/gdd/enemy-database.md
    variables:
      - structure (enemy HP pool)
      - region_fraction (0.15-0.55, authored per region)
      - BREAK_HP_MIN
    output_range: [5, 330]
    expression: "max(BREAK_HP_MIN, floor(structure * region_fraction + 0.0001))"
    notes: "Break region HP, derived not free-authored. Epsilon nudge is LOAD-BEARING
      (8 real cases at 2-decimal fractions, e.g. 180*0.35 = 62.99999999999999 —
      verified 2026-07-09). Part-Break System consumes the resulting break_hp;
      AC-ED-07(a) validates stored == derived."
    added: 2026-07-09
    revised: ""

  - name: DF-1
    status: active
    source: design/gdd/damage-formula.md
    referenced_by:
      - design/gdd/damage-formula.md
      - design/gdd/enemy-database.md
    variables:
      - A (attacker power stat)
      - D (target defense stat)
      - T (type effectiveness multiplier)
      - crit_mult
      - EPSILON
      - DAMAGE_FLOOR
    output_range: [1, 165]
    expression: "max(DAMAGE_FLOOR, floor((A*A/(A+D)) * T * crit_mult + EPSILON))"
    notes: "Realistic range 3–106. PHYSICAL path: A=physical_power, D=armor. ENERGY path: A=energy_power, D=resistance."
    added: 2026-07-09
    revised: ""

# Example:
#
# formulas:
#   - name: damage_formula
#     status: active
#     source: design/gdd/combat.md
#     referenced_by:
#       - design/gdd/combat.md
#       - design/gdd/progression.md   # progression GDD scales attack variable
#     variables:
#       - attack
#       - defense
#       - crit_chance
#       - crit_multiplier
#     output_range: [0, 999]
#     expression: "max(0, attack - defense) * (1 + crit_chance * crit_multiplier)"
#     notes: "Output feeds into health-system damage intake. Min is 0 (armour
#       can absorb all damage). Max is uncapped in formula but tuning knob
#       damage_cap in combat.md clamps at 999."
#     added: 2026-03-26
#     revised: ""


# ─── CONSTANTS ───────────────────────────────────────────────────────────────
# Named numerical values referenced across multiple systems.
# Register a constant when it is defined in one GDD but another GDD must
# agree with it (e.g., gold carry limit defined in economy but checked in
# inventory, or base inventory slots defined in inventory but displayed in HUD).
#
# Required fields: name, status, source, referenced_by, value, unit, added

constants:
  - name: TEAM_ROSTER_CAP
    status: active
    source: design/gdd/symbot-assembly.md
    referenced_by:
      - design/gdd/symbot-assembly.md
    value: 3
    unit: active Symbots in battle
    notes: "Max Symbots fielded per battle. Workshop System enforces this cap.
      Safe range 2–4 per Tuning Knobs. Unlimited storage for benched Symbots."
    added: 2026-07-10
    revised: ""

  - name: ACTIVE_MOVE_SLOTS
    status: active
    source: design/gdd/symbot-assembly.md
    referenced_by:
      - design/gdd/symbot-assembly.md
    value: 4
    unit: move slots per Symbot in battle
    notes: "Slot 0 = Basic Attack (universal). Slot 1 = WEAPON skill. Slot 2 = HEAD skill.
      Slot 3 = ARMS skill (null if Common ARMS). Turn-Based Combat UI must accommodate
      a null Move 4. Safe range 3–5 per Tuning Knobs."
    added: 2026-07-10
    revised: ""

  - name: BREAK_HP_MIN
    status: active
    source: design/gdd/enemy-database.md
    referenced_by:
      - design/gdd/enemy-database.md
    value: 5
    unit: region break HP (integer damage pool floor)
    notes: "Floor on EDB-1 derived break_hp. Defensive within MVP content ranges
      (min derivable value is 9 at structure 60 x fraction 0.15); activates only
      for out-of-band inputs. Safe range 3-10 per Tuning Knobs."
    added: 2026-07-09
    revised: ""

  - name: DAMAGE_FLOOR
    status: active
    source: design/gdd/damage-formula.md
    referenced_by:
      - design/gdd/damage-formula.md
    value: 1
    unit: Structure points (integer damage)
    added: 2026-07-09
    revised: ""

  - name: DAMAGE_FORMULA_EPSILON
    status: active
    source: design/gdd/damage-formula.md
    referenced_by:
      - design/gdd/damage-formula.md
    value: 0.0001
    unit: dimensionless float offset
    notes: "IEEE 754 nudge for floor() in Formula DF-1. Fixed — not a tuning knob."
    added: 2026-07-09
    revised: ""

