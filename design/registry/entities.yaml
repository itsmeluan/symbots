    value: 25
    unit: consecutive failed optimal-condition attempts before a guaranteed Prototype drop
    notes: "DS-2 (PGP-1). Per-Prototype-ID counter; guarantee fires on the (N+1)th optimal attempt
      worst-case. Hidden from the player (surprise-rescue). At 25, ~0.99% of hunters hit pity at the
