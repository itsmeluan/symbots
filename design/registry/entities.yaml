      Coupled to SA-F1 Structure ranges — recheck the glass-cannon case if enemy power (EDB-2) or Structure ranges
      change. Re-run the PB-F5 epsilon scan if changed. Global constant in MVP (all enemies); per-enemy enrage_enabled
      is OQ-PB-4."
