# ─── CONSTANTS ───────────────────────────────────────────────────────────────
# Named numerical values referenced across multiple systems.
# Register a constant when it is defined in one GDD but another GDD must
# agree with it (e.g., gold carry limit defined in economy but checked in
# inventory, or base inventory slots defined in inventory but displayed in HUD).
#
# Required fields: name, status, source, referenced_by, value, unit, added

constants:
  - name: SYNERGY_THRESHOLD_TIER1
    status: active
    source: design/gdd/synergy-system.md
    referenced_by:
      - design/gdd/synergy-system.md
    value: 3
    unit: equipped parts sharing a tag (minimum for small bonus)
    notes: "Safe range 3–4. At 2, any two matching parts trigger a bonus (insufficient intentionality).
      Combined synergies use this threshold for EACH constituent tag independently."
    added: 2026-07-10
    revised: "2026-07-10"  # raised from 2 → 3 (design-review blocker A1: fantasy text described 3-piece; constant now matches)

  - name: SYNERGY_THRESHOLD_TIER2
    status: active
    source: design/gdd/synergy-system.md
    referenced_by:
      - design/gdd/synergy-system.md
    value: 5
    unit: equipped parts sharing a tag (minimum for large bonus)
    notes: "Safe range 4–7. Must be > SYNERGY_THRESHOLD_TIER1. At 4, too easy to achieve
      alongside another synergy. At 7, near-impossible without abandoning all other synergy lines."
    added: 2026-07-10
    revised: "2026-07-10"  # raised from 4 → 5 (paired with TIER1 raise; creative-director recommendation 5–6)

  - name: TEAM_ROSTER_CAP
    status: active
    source: design/gdd/symbot-assembly.md
    referenced_by:
      - design/gdd/symbot-assembly.md
    value: 3
    unit: active Symbots in battle
    notes: "Max Symbots fielded per battle. Workshop System enforces this cap.
      Safe range 2–4 per Tuning Knobs. Unlimited storage for benched Symbots."
    added: 2026-07-10
    revised: ""

  - name: ACTIVE_MOVE_SLOTS
    status: active
    source: design/gdd/symbot-assembly.md
    referenced_by:
      - design/gdd/symbot-assembly.md
    value: 4
    unit: move slots per Symbot in battle
    notes: "Slot 0 = Basic Attack (universal). Slot 1 = WEAPON skill. Slot 2 = HEAD skill.
      Slot 3 = ARMS skill (null if Common ARMS). Turn-Based Combat UI must accommodate
      a null Move 4. Safe range 3–5 per Tuning Knobs."
    added: 2026-07-10
    revised: ""

  - name: BREAK_HP_MIN
    status: active
