    added: 2026-07-10
    revised: "2026-07-11 — calibration re-corrected: floor-compliant min rate is 0.16875 -> 0.99% (0.15 -> 1.72% is sub-floor only; was mislabeled 'authored floor')."

  - name: M_BOSS_PITY
    status: active
    source: design/gdd/drop-system.md
    referenced_by:
      - design/gdd/drop-system.md            # DS-3 Boss-grade deterministic floor
      - design/gdd/part-database.md           # discharges EC-16 (Boss-grade acquisition floor)
    value: 8
    unit: consecutive qualifying-break drop-roll failures before a guaranteed Boss-grade drop
    notes: "DS-3 (BGDF-1). Per-Boss-grade-ID counter; only qualifying breaks (required break fired)
      count — break-failure is Part-Break's DB3, not this counter. Guarantee fires on the (M+1)th
      qualifying break worst-case. Hidden. At 8, ~0.4% hit pity (0.5^8) — preserves the ~2-attempt
      average intent (Enemy DB BOSS_GRADE_BREAK_GUARANTEE). Safe range 5–8. Persisted by Save/Load.
      Calibration valid only while the >= x500 Boss-grade break rule (Part DB AC-11) holds — load-bearing."
    added: 2026-07-10
    revised: ""

