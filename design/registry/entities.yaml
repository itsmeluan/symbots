# Required fields: name, status, source, referenced_by, added
# Attribute fields: trigger_category, scope, behavior_class, behavior_params,
#   stacking_policy

passives:
  - name: volt_shock_on_hit
    status: active
    source: design/gdd/passive-database.md
    referenced_by:
      - design/gdd/passive-database.md      # Rule 5 (owner/author)
      - design/gdd/turn-based-combat.md     # Rule 13 registry + AC-TBC-29 (executor)
      - design/gdd/synergy-system.md         # VOLT 5-piece tier effects grant this ID
      - design/gdd/move-database.md          # OQ-MDB-1 names it as the rider Passive DB must author
    trigger_category: ON_HIT
    scope: ANY_DAMAGE
    behavior_class: STATUS_RIDER
    behavior_params: "{ status_id: SHOCK, duration: 1 }"
    stacking_policy: UNIQUE_PER_TRIGGER
    notes: "Shock 1 turn — deliberately shorter than the move-applied 2 (passive rider is the
      weaker, automatic application). TBC Rule 13 annotates '1 turn — shorter than the move-applied 2'.
      Potency (mobility penalty) is TBC-F4's, snapshot pre-synergy. Changing duration requires
      simultaneous passive-database.md Rule 5 + turn-based-combat.md Rule 13 + AC-TBC-29 update."
    added: 2026-07-10
    revised: ""

