# ─── FORMULAS ────────────────────────────────────────────────────────────────
# Named calculations with defined variables and output ranges.
# Register a formula when its output feeds into another system's input,
# or when another GDD references it by name.
#
# Required fields: name, status, source, referenced_by, variables[],
#   output_range[min, max], added
# Optional: expression (the actual formula), notes

formulas:
  - name: SA-F1
    status: active
    source: design/gdd/symbot-assembly.md
    referenced_by:
      - design/gdd/symbot-assembly.md
      - design/gdd/turn-based-combat.md
    variables:
      - stat_bonuses (per-part flat integer, from SympartData)
      - upgrade_tier (0–5, per-part)
      - chassis_archetype_modifier (multiplier from Rule 3 table, per stat)
      - stat_key (one of the 11 stat names)
    output_range:
      structure: [60, 594]
      armor: [0, 132]
      resistance: [0, 132]
      physical_power: [0, 110]
      energy_power: [0, 110]
      mobility: [0, 96]
      targeting: [0, 110]
      processing: [0, 110]
      cooling: [0, 110]
      energy_capacity: [80, 120]
      recharge: [0, 30]
    expression: |
      step1: part_stat = F2(stat_bonuses, upgrade_tier)   # positive bonus
             part_stat = F2b(stat_bonuses, upgrade_tier)  # negative bonus
      step2: raw = sum(part_stat for all 8 parts, per stat_key)
      step3: modified = raw * chassis_archetype_modifier.get(stat_key, 1.0)
      step4: final_stat[stat_key] = max(0, floor(modified + 0.0001))
    notes: "Owns the 4-step stat derivation pipeline. Synergy bonus is added
      AFTER this pipeline by the Synergy System — not included in final_stat.
      Stats are uncapped above — output_range values are content-authoring targets,
      not formula-enforced limits (EC-SA-06 explicitly allows recharge > 30).
      Epsilon nudge in F2b is LOAD-BEARING (e.g. base=-15 tier+2:
      15 * (2/3) = 5.000000000000001 in IEEE 754; ceil without -0.0001 returns
      6 → result -6 (wrong); with epsilon: ceil(4.9999...) = 5 → result -5 (correct)).
      output_range[recharge] max is 30 as authoring target only; values above 30
      are possible via content error and are logged but not clamped (EC-SA-06)."
    added: 2026-07-10
    revised: "2026-07-10"  # corrected step3 (removed erroneous floor), step4 (removed stat_max ref), epsilon example, and range notes

  - name: SYN-F1
    status: active
    source: design/gdd/synergy-system.md
    referenced_by:
      - design/gdd/synergy-system.md
      - design/gdd/turn-based-combat.md
    variables:
      - tag (StringName — e.g. &"ironclad", &"VOLT")
      - synergy_tags (Array[StringName] per SympartData — null slots contribute 0)
    output_range:
      tag_count: [0, 8]
    expression: "tag_count[tag] = Σ (1 for each equipped part p where tag ∈ p.synergy_tags)"
    notes: "Bounded by the 8-slot maximum. Null slots contribute nothing. All-null build → all counts = 0."
    added: 2026-07-10
    revised: ""

  - name: SYN-F2
    status: active
    source: design/gdd/synergy-system.md
    referenced_by:
      - design/gdd/synergy-system.md
      - design/gdd/turn-based-combat.md
    variables:
      - tier.requirements (list of (tag, min_count) pairs — one pair for single-tag, two+ for combined)
      - tag_count (from SYN-F1)
    output_range: "boolean"
    expression: "tier_active(tier) = ∀ (tag, min_count) ∈ tier.requirements : tag_count[tag] ≥ min_count"
    notes: "Combined synergies require ALL constituent conditions met simultaneously. Thresholds
      defined by SYNERGY_THRESHOLD_TIER1 (3) and SYNERGY_THRESHOLD_TIER2 (5)."
    added: 2026-07-10
    revised: "2026-07-10"  # updated threshold refs from 2/4 → 3/5

  - name: SYN-F3
    status: active
    source: design/gdd/synergy-system.md
    referenced_by:
      - design/gdd/synergy-system.md
      - design/gdd/turn-based-combat.md
    variables:
      - active_tiers (from SYN-F2)
      - tier.stat_delta (Dictionary[String, int] per tier)
      - tier.effects (Array[StringName] per tier)
    output_range: "stat_delta: Dictionary[String, int]; effects: Array[StringName] (deduplicated)"
    expression: |
      synergy_bonus_block.stat_delta[S] = Σ tier.stat_delta.get(S, 0) for all active tiers
      synergy_bonus_block.effects = deduplicate(flatten([tier.effects for all active tiers]))
    notes: "Tiers are cumulative — 5-piece active means both 3-piece and 5-piece contribute.
      Combined synergy bonuses stack additively with constituent single-tag bonuses.
      Deduplication prevents the same effect ID from appearing twice in the output."
    added: 2026-07-10
    revised: "2026-07-10"  # updated tier name refs from 2/4-piece → 3/5-piece

  - name: SYN-F4
    status: active
    source: design/gdd/synergy-system.md
    referenced_by:
      - design/gdd/synergy-system.md
      - design/gdd/turn-based-combat.md
    variables:
      - Assembly.final_stat[S] (integer from SA-F1, already ≥ 0)
      - synergy_bonus_block.stat_delta.get(S, 0) (integer from SYN-F3; 0 if no active synergy)
    output_range: "[0, ∞) — uncapped above, floored at 0"
    expression: "effective_stat[S] = max(0, Assembly.final_stat[S] + synergy_bonus_block.stat_delta.get(S, 0))"
    notes: "Used by TBC and Workshop UI when computing effective stats for display or damage resolution.
      Pure integer arithmetic — no epsilon needed. max(0) floor is a content-error defense only;
      MVP synergy content should not produce negative stat_delta values.
      Stats are uncapped above, matching SA-F1 behavior."
    added: 2026-07-10
    revised: ""

  - name: SA-F2
    status: active
    source: design/gdd/symbot-assembly.md
    referenced_by:
      - design/gdd/symbot-assembly.md
    variables:
      - target_slot (the slot being previewed)
      - candidate_part (SympartData not yet equipped)
      - current_build (SymbotBuild, unmodified)
    output_range: "delta per stat — negative = decrease, positive = increase; magnitude bounded by SA-F1 output ranges"
    expression: |
      hypothetical = run SA-F1 with candidate_part replacing current_build.parts[target_slot]
      delta[stat_key] = hypothetical[stat_key] - current_build.final_stat[stat_key]
      (Chassis swap note: changes all 11 stats via modifier table re-application,
       even for stats with candidate.stat_bonuses[key]=0)
    notes: "Read-only — no signals, no Inventory change, no slot write. Synergy
      excluded: delta is base-stats only. Used by Workshop UI for live stat preview."
    added: 2026-07-10
    revised: ""

  - name: TBC-F3
    status: active
    source: design/gdd/turn-based-combat.md
    referenced_by:
      - design/gdd/turn-based-combat.md
    variables:
      - snapshotted_processing (applier's processing at application time, 0-110)
      - BURN_COEFF (0.08)
      - BURN_MIN (2)
    output_range: [2, 8]
    expression: "burn_damage = max(BURN_MIN, floor(snapshotted_processing * BURN_COEFF + 0.0001))"
    notes: "Burn DoT per tick at afflicted combatant's turn start. BYPASSES DF-1 —
      armor/resistance/type do not apply. 2-turn duration, no stacking, newest-wins
      reapplication. Epsilon defensive (scanned 2026-07-10). Enemy AI and Combat UI
      will read this for threat evaluation and display."
    added: 2026-07-10
    revised: ""

  - name: TBC-F4
    status: active
    source: design/gdd/turn-based-combat.md
    referenced_by:
      - design/gdd/turn-based-combat.md
    variables:
      - snapshotted_processing (applier's processing at application time, 0-110)
