  - name: STATUS_BASE_VALUE
    status: active
    source: design/gdd/enemy-ai.md
    referenced_by:
      - design/gdd/enemy-ai.md               # EAI-1c status_factor
    value: 1.0
    unit: base score value for an Enemy AI applying a new status (Burn/Shock/Stagger)
    notes: "EAI-1c. Discounted to 0.0 if the target already carries that status (reapplication wasteful). Effective status
      pull = STATUS_BASE_VALUE * w_stat (the profile's status weight) — tune this OR w_stat, not both. Safe range 0.5-1.5
      (NARROWED from 0.5-2.0 in the 2nd 2026-07-12 /design-review, B2 fix): above 1.5 the TACTICAL kill-securing invariant
      w_lethal >= w_type + w_stat*STATUS_BASE_VALUE breaks (5.0 < 2.0 + 2.0*1.75) and the Pillar-2 harvest exploit re-opens.
      0.0 is a global kill-switch (zeroes status scoring for every profile), NOT a low tune. MVP treats all three statuses
      as equal value; per-status differentiation is post-MVP (OQ-EAI-1)."
    added: 2026-07-12
    revised: "2026-07-12 (2nd /design-review B2: safe range 0.5-2.0 -> 0.5-1.5; it is a coefficient in the kill-securing invariant)"

  - name: AI_PROFILE_WEIGHTS
    status: active
    source: design/gdd/enemy-ai.md
    referenced_by:
      - design/gdd/enemy-ai.md               # EAI-1 / Rule 5 profile presets
      - design/gdd/enemy-database.md          # ai_profile field resolves to one of these keys
    value: "{AGGRESSIVE: [3.0, 0.2, 0.0, 1.0], TACTICAL: [1.0, 2.0, 2.0, 5.0], OPPORTUNIST: [2.0, 0.5, 0.0, 4.0]}"
    unit: (w_dmg, w_type, w_stat, w_lethal) weight vector per ai_profile, consumed by EAI-1
    notes: "The three MVP Enemy AI profiles. AGGRESSIVE = damage-max bruiser (default fallback for unknown ai_profile).
      TACTICAL = type+status exploiter that still finishes. OPPORTUNIST = lethal-spike closer. KILL-SECURING INVARIANT
      (CORRECTED, 2nd 2026-07-12 /design-review B2): w_lethal >= w_type + w_stat*STATUS_BASE_VALUE for every profile, else it
      silently walks past lethal moves. The STATUS_BASE_VALUE coefficient was MISSING from the 1st-pass invariant (w_lethal >=
      w_type + w_stat) — that simplified form only holds at STATUS_BASE_VALUE=1.0 and looked satisfied at the old 2.0 ceiling
      when it actually fails. AGGRESSIVE (1.0>=0.2) and OPPORTUNIST (4.0>=0.5) clear it at any STATUS_BASE_VALUE (both w_stat=0);
      TACTICAL clears it only while STATUS_BASE_VALUE <= (w_lethal-w_type)/w_stat = 1.5 (hence the STATUS_BASE_VALUE cap 0.5-1.5).
      TACTICAL w_lethal RAISED 1.0->5.0 in the 1st 2026-07-12 review (old 1.0 declined securable kills, a Pillar-2 harvest
      exploit). Data-driven: authored in an ai_profiles Resource/.tres, loaded at startup (no hardcoded weights). Enemy DB
      validates ai_profile against these keys via EnemyAI.has_profile(id). Optional per-profile phase_threshold (Structure
      fraction, strict <; at most one per profile, AC-EAI-17) swaps to a phase_profile. TACTICAL enemies must carry >=1
      status-proc move (AC-EAI-18) or w_stat is dead weight. RECOMMENDED follow-up: a standing content-validation AC asserting
      this invariant for ALL profiles (would auto-catch B1/B2-class regressions). Felt difference is the #1 playtest watch (OQ-EAI-3)."
    added: 2026-07-12
    revised: "2026-07-12 (/design-review: TACTICAL w_lethal 1.0->5.0, kill-securing invariant)"

