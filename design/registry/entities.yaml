    scope: ANY_DAMAGE
    behavior_class: STATUS_RIDER
    behavior_params: "{ status_id: SHOCK, duration: 1 }"
    stacking_policy: UNIQUE_PER_TRIGGER
    notes: "Shock 1 turn — deliberately shorter than the move-applied 2 (passive rider is the
      weaker, automatic application). TBC Rule 13 annotates '1 turn — shorter than the move-applied 2'.
      Potency (mobility penalty) is TBC-F4's, snapshot pre-synergy. Changing duration requires
      simultaneous passive-database.md Rule 5 + turn-based-combat.md Rule 13 + AC-TBC-29 update."
