    referenced_by:
      - design/gdd/symbot-core-progression.md
    variables:
      - cumulative_xp (int [0, inf), a core's total earned XP)
      - XP_PER_LEVEL_BASE (100)
      - LEVEL_COST_RAMP (1.20)
      - MAX_CORE_LEVEL (10)
    output_range: "level int [1, 10]"
    expression: "level = L where threshold[L] <= cumulative_xp < threshold[L+1]; threshold[] = [0,100,220,364,537,744,993,1292,1650,2080]"
    notes: "Player-side XP-to-level table (Level Backbone core side). Pre-computed threshold table is the runtime authority — do NOT re-run the ramp formula per lookup (sorted-int lookup only). Thresholds cumulative: L2=100, L3=220, L4=364, L5=537, L6=744, L7=993, L8=1292, L9=1650, L10=2080. Level always re-derived from cumulative_xp on load (never trust serialized level — EC-CP-06). >= boundary (AC-CP-02). Arc pacing PROVISIONAL until MVP zone level range is set (OQ-CP-1)."
    added: 2026-07-12
    revised: ""

  - name: CP-F2
    status: active
    source: design/gdd/symbot-core-progression.md
    referenced_by:
      - design/gdd/symbot-core-progression.md
    variables:
      - full_xp (int, = defeated enemy xp_value from CP-F4)
      - BENCH_XP_SHARE (0.5 exactly)
    output_range: "[0, floor(full_xp * 0.5)]"
    expression: "bench_xp = floor(full_xp * BENCH_XP_SHARE)"
    notes: "Benched-core XP award. NO epsilon guard needed — BENCH_XP_SHARE=0.5=2^-1 is exactly representable in IEEE754, so N*0.5 is exact for all int N (odd N -> exact X.5, floor correct). If BENCH_XP_SHARE ever becomes non-power-of-2, add +0.0001 epsilon + python3 scan. Subject to the Rule 3 bench-level-lead cap (BENCH_LEVEL_LEAD_CAP): a benched core at level >= enemy_level + cap earns 0 (EC-CP-03/AC-CP-08)."
    added: 2026-07-12
    revised: ""

  - name: CP-F3
    status: active
    source: design/gdd/symbot-core-progression.md
    referenced_by:
      - design/gdd/symbot-core-progression.md
      - design/gdd/symbot-assembly.md          # Assembly applies this step between SA-F1 and SYN-F4 (erratum pending)
    variables:
      - "level_growth[stat_key] (int [0,N], authored per CORE part, CORE-slot only)"
      - core.level (int [1,10])
    output_range: "[0, level_growth[stat_key] * 9]"
    expression: "level_contribution[stat_key] = level_growth[stat_key] * (core.level - 1)"
    notes: "Core level-growth stat contribution. Pure INTEGER multiply — no floor/float/epsilon. Applied AFTER SA-F1 (bypasses chassis modifier) and BEFORE SYN-F4 (synergy adds on top) — pipeline ORDERING is load-bearing, verified by AC-CP-18 (160 != 168 discriminator). Level-1 core contributes 0 (level-1=0), seamless with SA-F1. Only the CORE-slot part's level_growth is read (non-CORE ignored, EC-CP-11). Anti-grind: keep level-10 total sub-dominant vs part-derived stats; Spark Core example structure=2 (+18), not 5."
    added: 2026-07-12
    revised: ""

  - name: CP-F4
    status: active
    source: design/gdd/symbot-core-progression.md
    referenced_by:
      - design/gdd/symbot-core-progression.md
      - design/gdd/enemy-database.md            # stores derived xp_value per enemy (Enemy Level & Zone Scaling erratum pending)
      - design/gdd/turn-based-combat.md          # passes xp_value in battle_ended (erratum pending)
      - design/gdd/enemy-level-zone-scaling.md   # Rule 2 stored-equals-derived validation (AC-ELZS-02); constants ratified by this pass
    variables:
      - enemy_level (int [1, MAX_ENEMY_LEVEL])
      - XP_BASE (35, CONFIRMED)
      - XP_PER_ENEMY_LEVEL (10, CONFIRMED)
      - "role_multiplier (int; WILD=1, BOSS=BOSS_XP_MULTIPLIER=2)"
    output_range: "positive int"
    expression: "xp_value = (XP_BASE + enemy_level * XP_PER_ENEMY_LEVEL) * role_multiplier"
    notes: "Bridge formula (Level Backbone): enemy level -> awarded XP. Pure INTEGER — no floor/float/epsilon (all multipliers int). Worked: L1 WILD=45, L2 WILD=55, L3 WILD=65, L4 WILD=75, L5 WILD=85, L5 BOSS=170, L6 BOSS=190. Constants CONFIRMED 2026-07-12 by Enemy Level & Zone Scaling (#10c) for MVP zone [1,6] — OQ-CP-1 RESOLVED (pacing: L3 in ~4-5 fights, L5 in ~10-12 incl Boss 1). Ownership shared: Core Progression defines the conversion; Enemy DB stores xp_value (stored-equals-derived, AC-ELZS-02); #10c owns level authoring. AC-CP-16 isolates each constant."
    added: 2026-07-12
    revised: "2026-07-12"  # constants provisional -> CONFIRMED by #10c (OQ-CP-1 resolved); referenced_by += enemy-level-zone-scaling.md

  - name: DS-F-LEVEL
    status: active
    source: design/gdd/enemy-level-zone-scaling.md
    referenced_by:
      - design/gdd/enemy-level-zone-scaling.md
      - design/gdd/drop-system.md                # amends DS-1: inserts level_rarity_mult into the effective-rate product (erratum pending)
    variables:
      - "base_drop_rate[rarity] (float {0.70, 0.25, 0.05, 0.001}, Part DB config)"
      - "level_rarity_mult (float {0.5, 1.0, 1.5} from LEVEL_RARITY_MULTS[level_band(enemy.level)][rarity])"
      - "Pi(condition_multipliers) (float [1.0, inf), existing DS-1 factor)"
      - "beacon_factor (float {1.0, 2.0}, existing CD-4 factor)"
    output_range: "[0.0, 1.0]"
    expression: "effective_drop_rate(p) = clamp(base_drop_rate[rarity(p)] * level_rarity_mult * Pi(condition_multipliers) * beacon_factor, 0, 1); level_band: L1-2 EARLY / L3-5 MID / L6+ HIGH"
    notes: "Level-scaled drop rate (Level Backbone drop side; resolves OQ-CP-3 rarity-odds half — stat rolls deferred to Alpha, OQ-ELZS-2). Same float-clamp-into-randf< pattern as CD-4/CD-5 — NO floor/ceil/epsilon, no python3 scan. Only Rare scaled (see LEVEL_RARITY_MULTS). Discriminating spread (Rare, x1.5 cond, no beacon): EARLY 0.1875 / MID 0.375 / HIGH 0.5625 — an impl ignoring level_rarity_mult returns 0.375 for all three (AC-ELZS-10). Rare+HIGH+Beacon+x1.5cond -> clamp(1.125)=1.0 guaranteed (EC-ELZS-07, expected). level_band >= boundary at L3 is AC-ELZS-09's discriminator."
    added: 2026-07-12
    revised: ""

