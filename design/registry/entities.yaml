# Game World Entity Registry
#
# PURPOSE: Single source of truth for all named game-world facts that appear
# in more than one document. Skills check this before writing new content to
# detect cross-doc inconsistencies at authoring time.
#
# RULES:
#   - Only register facts that cross system boundaries. Internal-only facts
#     (a formula used in one GDD only) do NOT need to be registered.
#   - Never delete entries — set status: deprecated instead.
#   - When a value changes: update the value, set revised: to today's date,
#     and add a comment with the old value and which GDD changed it.
#   - source: is the authoritative GDD — the one that "owns" this fact.
#     Other GDDs that reference it list themselves in referenced_by.
#   - When a new GDD references an existing entry, append its path to
#     referenced_by. Do not create a duplicate entry.
#
# WRITTEN BY: /design-system (Phase 5 — after GDD sections are approved)
#             /consistency-check (when resolving conflicts)
# READ BY:    /design-system (Phase 2 — before authoring begins, and after
#               Section C/D writes to conflict-check new entities/formulas)
#             /consistency-check (primary input — grep-first, GDD-second)
#             /review-all-gdds (Phase 1 — baseline for Phase 2 checks)
#             /architecture-review (data structure and interface validation)
#
# SEARCH PATTERNS (for skills using Grep):
#   All entity names:        Grep pattern="^  - name:" path="design/registry/entities.yaml"
#   Specific entity:         Grep pattern="  - name: goblin" path="design/registry/entities.yaml"
#   All items:               Grep pattern="^  - name:" path="design/registry/entities.yaml" (items section)
#   What combat.md owns:     Grep pattern="source: design/gdd/combat.md"
#   What inventory.md uses:  Grep pattern="referenced_by.*inventory"
#   All gold values:          Grep pattern="value_gold:"
#   Deprecated entries:      Grep pattern="status: deprecated"
#
# FORMAT: YAML. Consistent indentation is critical for grep reliability.
#   Sections: entities | passives | items | formulas | constants
#   Each entry: name, status, source, referenced_by[], attributes{}, added, revised

version: 1
last_updated: "2026-07-10"  # added passives section (3 ratified status riders from passive-database.md)

# ─── ENTITIES ────────────────────────────────────────────────────────────────
# Named game-world objects: enemies, NPCs, characters, factions, bosses.
# Register an entity here when it appears in more than one GDD — e.g., an
# enemy defined in combat.md that also drops items listed in inventory.md.
#
# Required fields: name, status, source, referenced_by, added
# Attribute fields: any key stats that could appear in another GDD
#   (health, damage, drops, faction, etc.)

entities: []

# Example (remove when first real entry is added):
#
# entities:
#   - name: goblin
#     status: active              # active | deprecated
#     source: design/gdd/combat.md
#     referenced_by:
#       - design/gdd/combat.md
#       - design/gdd/inventory.md
#     health: 40
#     damage: 8
#     drops:
#       - item: goblin_arm        # must match an entry in items section
#         qty: 1
#         drop_rate: 0.8          # 0.0–1.0
#     added: 2026-03-26
#     revised: ""


# ─── PASSIVES ────────────────────────────────────────────────────────────────
# Named passive effect IDs from the Passive Database catalog that cross system
# boundaries. Register a passive when its ID and behavior contract are shared
# between the Passive DB (design-level owner) and TBC Rule 13 (runtime executor),
# or referenced by Synergy/Move DB content. Durations here are the PASSIVE-RIDER
# durations (distinct from move-applied STATUS_DURATION=2); they MUST stay synced
# between passive-database.md Rule 5 and turn-based-combat.md Rule 13.
#
# Required fields: name, status, source, referenced_by, added
# Attribute fields: trigger_category, scope, behavior_class, behavior_params,
#   stacking_policy

passives:
  - name: volt_shock_on_hit
    status: active
    source: design/gdd/passive-database.md
    referenced_by:
      - design/gdd/passive-database.md      # Rule 5 (owner/author)
      - design/gdd/turn-based-combat.md     # Rule 13 registry + AC-TBC-29 (executor)
      - design/gdd/synergy-system.md         # VOLT 5-piece tier effects grant this ID
      - design/gdd/move-database.md          # OQ-MDB-1 names it as the rider Passive DB must author
    trigger_category: ON_HIT
    scope: ANY_DAMAGE
    behavior_class: STATUS_RIDER
    behavior_params: "{ status_id: SHOCK, duration: 1 }"
    stacking_policy: UNIQUE_PER_TRIGGER
    notes: "Shock 1 turn — deliberately shorter than the move-applied 2 (passive rider is the
      weaker, automatic application). TBC Rule 13 annotates '1 turn — shorter than the move-applied 2'.
      Potency (mobility penalty) is TBC-F4's, snapshot pre-synergy. Changing duration requires
      simultaneous passive-database.md Rule 5 + turn-based-combat.md Rule 13 + AC-TBC-29 update."
    added: 2026-07-10
    revised: ""

  - name: thermal_burn_on_weapon
    status: active
    source: design/gdd/passive-database.md
    referenced_by:
      - design/gdd/passive-database.md      # Rule 5 (owner/author)
      - design/gdd/turn-based-combat.md     # Rule 13 registry + AC-TBC-30 (executor)
    trigger_category: ON_HIT
    scope: WEAPON_ONLY
    behavior_class: STATUS_RIDER
    behavior_params: "{ status_id: BURN, duration: 2 }"
    stacking_policy: UNIQUE_PER_TRIGGER
    notes: "Burn 2 turns — full duration (Weapon attacks are the primary damage source; the Weapon
      rider is full-strength). WEAPON-slot narrowing is the `scope` field, not a separate trigger
      (ON_WEAPON_HIT was removed 2026-07-10 — collapsed to ON_HIT + scope: WEAPON_ONLY to match
      TBC Rule 13 exactly). Potency is TBC-F3's. AC-TBC-30 asserts WEAPON-slot-only firing."
    added: 2026-07-10
    revised: ""

  - name: kinetic_stagger_on_hit
    status: active
    source: design/gdd/passive-database.md
    referenced_by:
      - design/gdd/passive-database.md      # Rule 5 (owner/author)
      - design/gdd/turn-based-combat.md     # Rule 13 registry (executor)
    trigger_category: ON_HIT
    scope: ANY_DAMAGE
    behavior_class: STATUS_RIDER
    behavior_params: "{ status_id: STAGGER, duration: 1 }"
    stacking_policy: UNIQUE_PER_TRIGGER
    notes: "Stagger 1 turn — same 'automatic, weaker' logic as the Shock rider. Potency (outgoing
      damage reduction) is TBC-F5's, applied post-MOVE-F1. Changing duration requires simultaneous
      passive-database.md Rule 5 + turn-based-combat.md Rule 13 update."
    added: 2026-07-10
    revised: ""


# ─── ITEMS ───────────────────────────────────────────────────────────────────
# Named collectables, equipment, consumables, crafting materials, currency.
# Register an item when its name or value appears in more than one GDD.
#
# Required fields: name, status, source, referenced_by, added
# Attribute fields: value_gold, weight, stackable, category, and any stat
#   modifiers that another system (e.g., economy, crafting) might reference.

items: []

# Example:
#
# items:
