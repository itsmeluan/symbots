# Architecture Decision Registry
#
# PURPOSE: Single source of truth for key architectural stances that all ADRs
# must agree on. Skills check this before writing new ADRs to detect conflicts
# at authoring time — before stories are created against contradictory decisions.
#
# RULES:
#   - Register a stance when it constrains how OTHER systems must be built.
#     An internal implementation detail that affects only one ADR does not need
#     to be registered.
#   - Never delete entries — set status: superseded_by: ADR-NNNN instead.
#   - When a stance changes: update the entry, set revised: to today's date,
#     add a comment with the old value, and run /architecture-review to check
#     what ADRs are now invalidated.
#   - adr: is the authoritative source. All other ADRs that depend on this
#     stance list themselves in referenced_by.
#
# WRITTEN BY: /architecture-decision (Phase 5 — after ADR is approved)
# READ BY:    /architecture-decision (Step 2 — before authoring begins)
#             /architecture-review (Phase 4 — cross-ADR conflict baseline)
#             /create-stories (to embed architectural constraints in stories)
#             /dev-story (to check implementation against accepted stances)
#
# SEARCH PATTERNS (for skills using Grep):
#   All state owners:       Grep pattern="^  - state:" path="docs/registry/architecture.yaml"
#   Who owns player_health: Grep pattern="state: player_health"
#   All signal contracts:   Grep pattern="pattern: signal"
#   Budget for combat:      Grep pattern="system: combat"
#   All forbidden patterns: Grep pattern="^  - pattern:" (forbidden_patterns section)
#   Superseded entries:     Grep pattern="status: superseded"

version: 1
last_updated: "2026-07-14"

# ─── STATE OWNERSHIP ─────────────────────────────────────────────────────────
# Who is the authoritative owner of each piece of shared game state.
# Conflicts: two ADRs claiming to own the same state = data race / authority bug.
#
# Register state when it is READ or WRITTEN by more than one system.
# Internal-only state (never accessed by another system) does not need to be registered.
#
# Required fields: state, owner_system, adr, interface, referenced_by[], added
# interface: how other systems access this state (read-only property, method call,
#   signal, shared resource, etc.) — this is the contract other ADRs depend on.

state_ownership:
  - state: symbot_final_stat
    status: active
    owner_system: symbot-assembly
    adr: docs/architecture/adr-0005-stat-pipeline.md
    interface: "SymbotBuild.final_stat cache (11 canonical keys -> int; parts + chassis +
      CP-F3 only — synergy NEVER included, Assembly Rule 8) + stats_changed(final_stat:
      Dictionary) signal. Recomputed ONLY via StatPipeline.derive on equip; battle reads
      the frozen CombatantSnapshot copy, never the live cache."
    write_access: symbot-assembly-only
    referenced_by:
      - docs/architecture/adr-0005-stat-pipeline.md
    added: 2026-07-14
    revised: ""

  - state: synergy_bonus_block
    status: active
    owner_system: synergy-system
    adr: docs/architecture/adr-0005-stat-pipeline.md
    interface: "SynergyEvaluator.cached_bonus_block (initialized to a valid empty zero-bonus
      block) + synergy_changed(active_synergies: Array[StringName], bonus_block: Dictionary)
      signal. evaluate() recomputes + always emits; evaluate_silent() recomputes without emit
      (battle baseline); preview() is pure — no cache write, no emit."
    write_access: synergy-system-only
    referenced_by:
      - docs/architecture/adr-0005-stat-pipeline.md
    added: 2026-07-14
    revised: ""

  - state: core_progression_ledger
    status: active
    owner_system: core-progression
    adr: docs/architecture/adr-0005-stat-pipeline.md
    interface: "CoreProgression ledger Dictionary[int, CoreProgressionRecord]; cumulative_xp
      is authoritative, level is a display cache always re-derived via CP-F1. Reads via
      can_equip/is_build_valid; writes ONLY via register_core/apply_battle_result;
      core_leveled_up(id, old_level, new_level) signal. Persists as plain data inside the
      exploration-progress save-provider blob (ADR-0001)."
    write_access: core-progression-only
    referenced_by:
      - docs/architecture/adr-0005-stat-pipeline.md
      - docs/architecture/adr-0001-save-load.md
    added: 2026-07-14
    revised: ""

  - state: rng_root_stream
    status: active
    owner_system: rng-service
    adr: docs/architecture/adr-0006-rng-service.md
    interface: "RngService._root (single RandomNumberGenerator, autoload slot 9) + captured
      _root_seed. Other systems NEVER touch the root directly — they receive vended int seeds
      / fresh RandomNumberGenerator instances (see interface rng_vending). Root seeded once at
      BootScreen run_boot() step 4; effective root seed logged via LogSink, NOT serialized."
    write_access: rng-service-only
    persisted: false             # DELIBERATELY non-persisted — do NOT add to any save provider (guards ADR-0001)
    referenced_by:
      - docs/architecture/adr-0006-rng-service.md
      - docs/architecture/adr-0001-save-load.md   # ADR-0001 persists pity counters but NOT RNG stream state
    added: 2026-07-14
    revised: ""

  - state: battle_runtime_state
    status: active
    owner_system: turn-based-combat
    adr: docs/architecture/adr-0007-tbc-state-machine.md
    interface: "BattleController (autoload slot 11) owns is_battle_active: bool + _state:
      BattleState, and a reference to a per-battle BattleContext (RefCounted). BattleContext
      holds the frozen player/enemy CombatantSnapshots, per-combatant current_structure/
      current_energy/current_heat, region break pools, statuses, the beacon flag, and the
      accumulating deployed_symbot_ids / fired_break_events sets. Created at BATTLE_INIT;
      the controller drops the reference synchronously AFTER the battle_ended emit() cascade
      returns (RefCounted — no queue_free). is_battle_active() is the ONLY cross-system read
      (SaveLoad manual-save quiesce gate, ADR-0002 §4)."
    write_access: turn-based-combat-only
    persisted: false             # transient per-battle state — never enters any save provider
    referenced_by:
      - docs/architecture/adr-0007-tbc-state-machine.md
      - docs/architecture/adr-0002-event-bus.md   # is_battle_active() manual-save gate + synchronous-teardown discard point
    added: 2026-07-14
    revised: ""

# Example:
#
# state_ownership:
#   - state: player_health
#     status: active           # active | superseded_by: ADR-NNNN
#     owner_system: health-system
#     adr: docs/architecture/adr-0001-health-system.md
#     interface: "HealthComponent.current_health (read-only float, range 0–max_health)"
#     write_access: health-system-only   # only owner can write; others read
#     referenced_by:
#       - docs/architecture/adr-0001-health-system.md
#       - docs/architecture/adr-0003-combat-system.md   # reads to apply damage
#       - docs/architecture/adr-0007-ui-system.md       # reads to display HUD
#     added: 2026-03-26
#     revised: ""


# ─── INTERFACE CONTRACTS ──────────────────────────────────────────────────────
# How systems are required to communicate with each other.
# Conflicts: one ADR expects signal, another expects direct call = integration bug.
#
# Register a contract when the communication pattern between two systems is
# explicitly decided in an ADR and other systems must follow the same pattern.
#
# pattern options: signal | direct_call | event_bus | shared_resource | rpc | none

interfaces:
  - contract: save_provider
    status: active
    pattern: direct_call     # Save/Load calls three methods on each registered provider
    producer: save-load
    consumers:
      - inventory            # part_instances, next_instance_id, scrap, consumables
      - workshop             # equipped builds
      - drop-system          # pity counters
      - settings             # player options
      - exploration-progress # the `progression` provider (wraps EP's own blob opaquely)
    adr: docs/architecture/adr-0001-save-load.md
    signal_signature: "snapshot() -> Dictionary (plain data only) / restore(data: Dictionary) (Phase 1, no cross-provider reads) / rederive() (Phase 2, provider-local)"
    referenced_by:
      - docs/architecture/adr-0001-save-load.md
      - docs/architecture/adr-0002-event-bus.md   # §4 save quiesce: autosave triggers + is_battle_active() manual-save gate
      - docs/architecture/adr-0004-scene-boot.md  # boot step 5 registers providers; Continue/New-Game share one restore→rederive path
      - docs/architecture/adr-0005-stat-pipeline.md  # CoreProgression ledger rides inside the exploration-progress blob as plain data
    added: 2026-07-13
    revised: ""

  - contract: combat_battle_end
    status: active
    pattern: signal          # owner-declared typed signal on TBC — NOT on the EventBus
    producer: turn-based-combat
    consumers:
      - core-progression     # XP award (reads is_first_boss_defeat guard)
      - drop-system          # loot roll from the battle payload
      - overworld-navigation # maps result → WIN/LOSS/FLEE and relays as EventBus.encounter_resolved
      - combat-ui            # end-of-battle screen (direct connection justified: UI already calls TBC to submit actions)
    adr: docs/architecture/adr-0002-event-bus.md
    signal_signature: "battle_ended(outcome: int, enemy_id: StringName,
      fired_break_events: Dictionary, xp_value: int, completion_bonus_xp: int,
      is_first_boss_defeat: bool, enemy_level: int, deployed_symbot_ids: Array)
      # 8-field, TBC Rule 12 verbatim (ADR-0002 §1); synchronous emit;
      payloads self-sufficient (ADR-0002 teardown contract) — TBC may discard battle state
      only after emit() returns"
    referenced_by:
      - docs/architecture/adr-0002-event-bus.md
      - docs/architecture/adr-0005-stat-pipeline.md   # CoreProgression.apply_battle_result consumes the 8 payload fields verbatim
      - docs/architecture/adr-0007-tbc-state-machine.md   # ADR-0007 PLACES the producer: BattleController emits, drops BattleContext after emit() returns
    added: 2026-07-13
    revised: "2026-07-13"  # /architecture-review conflict fix — signature was a bad transcription of Rule 12

  - contract: world_encounter_relay
    status: active
    pattern: event_bus       # one of the 3 signals on the closed MVP EventBus roster
    producer: overworld-navigation
    consumers:
      - zone-world-map       # zone-state recompute trigger
      - encounter-zone       # boss-gate re-evaluation trigger
      - world-map-ui         # map refresh
      - save-load            # autosave trigger — the ONLY CONNECT_DEFERRED site in the project (ADR-0002 §4)
      - screen-manager       # battle teardown (queue_free) + Overworld re-enable (ADR-0004 §3)
    adr: docs/architecture/adr-0002-event-bus.md
    signal_signature: "EventBus.encounter_resolved(result: int, encounter_type: int)
      # RENAMED from the ambiguous 2-field world 'battle_ended' (ADR-0002 §2) —
      # distinct name from TBC's 8-field combat battle_ended; statically testable"
    referenced_by:
      - docs/architecture/adr-0002-event-bus.md
      - docs/architecture/adr-0004-scene-boot.md   # ScreenManager subscribes; autosave connect sequenced at boot step 6
    added: 2026-07-13
    revised: ""

  - contract: content_db_lookup
    status: active
    pattern: direct_call     # every consumer reads content via the DB singletons' typed getters
    producer: content-databases   # PartDB / EnemyDB / MoveDB / PassiveDB / ConsumableDB / WorldLootDB
    consumers:
      - all-systems          # any system reading gameplay values (data-driven mandate)
    adr: docs/architecture/adr-0003-content-resources.md
    signal_signature: "load_catalog(catalog: XCatalog, log_sink: LogSink) -> bool (boot-time, DI;
      fatal on duplicate ID / null entry) / has_x(id: StringName) -> bool /
      get_x(id: StringName) -> XDef  # returns NULL for unknown id — callers MUST null-check
      (typed GDScript annotations do not prevent null). Defs are frozen shared instances;
      cross-DB references are StringName IDs, never Resource links."
    referenced_by:
      - docs/architecture/adr-0003-content-resources.md
      - docs/architecture/adr-0004-scene-boot.md   # boot step 2 sequences load_catalog for all 6 DBs before any consumer
      - docs/architecture/adr-0005-stat-pipeline.md  # StatPipeline copies primitives out of PartDef; build_enemy reads EnemyDef — never mutates/duplicates a def
    added: 2026-07-13
    revised: ""

  - contract: screen_transitions
    status: active
    pattern: direct_call     # systems REQUEST transitions on an injected ScreenManager reference
    producer: scene-management   # ScreenManager node under the persistent Game.tscn root
    consumers:
      - overworld-navigation # enter_battle(encounter_payload) — its GDD (#16) must author against this
      - main-menu            # goto_overworld() only valid after restore/fresh-init + rederive
      - workshop-ui          # open_workshop() / close_workshop()
      - all-screens          # every screen receives the manager injected at instantiation (no get_parent() climbing)
    adr: docs/architecture/adr-0004-scene-boot.md
    signal_signature: "goto_main_menu() / goto_overworld() / enter_battle(encounter_payload:
      Dictionary) / open_workshop() / close_workshop()  # ONLY ScreenManager creates, frees,
      shows, or hides screens. Battle exit is NOT a method — ScreenManager subscribes to
      EventBus.encounter_resolved and tears down via queue_free() ONLY (never free(): the
      synchronous cascade must unwind; later subscribers see is_queued_for_deletion()==true).
      Overworld keep-alive during battle: hide() + PROCESS_MODE_DISABLED + gui_release_focus()
      (4.6 dual-focus)."
    referenced_by:
      - docs/architecture/adr-0004-scene-boot.md
      - docs/architecture/adr-0008-ui-architecture.md   # ADR-0008 defines what a Screen IS; all screens receive the manager injected + request transitions
    added: 2026-07-13
    revised: ""

  - contract: combatant_snapshot
    status: active
    pattern: shared_resource   # immutable-by-construction RefCounted handed to battle
    producer: stat-pipeline    # CombatantSnapshot.build_player / build_enemy at BATTLE_INIT
    consumers:
      - turn-based-combat      # ADR-0007 damage resolution + initiative read effective_stat()
      - combat-ui              # stat displays
    adr: docs/architecture/adr-0005-stat-pipeline.md
    signal_signature: "CombatantSnapshot.build_player(build, bonus_block, aura_block) /
      build_enemy(def: EnemyDef) / effective_stat(s: StringName) -> int
      # built ONCE at BATTLE_INIT; every field deep-copied; no setters; one class for both
      sides (enemy synergy/aura = {}); effective_stat is THE in-battle SYN-F4 composition point"
    referenced_by:
      - docs/architecture/adr-0005-stat-pipeline.md
      - docs/architecture/adr-0007-tbc-state-machine.md   # TBC reads the frozen snapshot for damage + initiative; held in BattleContext
      - docs/architecture/adr-0008-ui-architecture.md   # Combat UI reads the frozen CombatantSnapshot for stat displays (never the live build)
    added: 2026-07-14
    revised: ""

  - contract: damage_computation
    status: active
    pattern: direct_call       # pure static function, no state
    producer: stat-pipeline
    consumers:
      - turn-based-combat      # ADR-0007 damage resolution
      - workshop-ui            # damage preview displays
    adr: docs/architecture/adr-0005-stat-pipeline.md
    signal_signature: "DamageFormula.compute_damage(a: int, d: int, type_mult: float, cfg,
      log, crit_mult: float = 1.0) -> int
      # DF-1 verbatim: a==0 && d==0 -> damage_floor BEFORE division; float casts before
      divide; type/crit multipliers pre-floor; maxi(damage_floor, floor_eps(...)) post.
      Deterministic — consumes NO RNG; crit_mult is passed in, never rolled here"
    referenced_by:
      - docs/architecture/adr-0005-stat-pipeline.md
      - docs/architecture/adr-0006-rng-service.md   # crit roll lives in TBC (next_seed(&"crit")); crit_mult passed IN, DF-1 stays deterministic
      - docs/architecture/adr-0007-tbc-state-machine.md   # TBC is the sole crit-roller — passes crit_mult into compute_damage
      - docs/architecture/adr-0008-ui-architecture.md   # Workshop UI damage preview calls compute_damage — same MOVE-F1 chain, no reimplementation
    added: 2026-07-14
    revised: ""

  - contract: synergy_evaluation
    status: active
    pattern: direct_call       # + owner-declared synergy_changed signal
    producer: synergy-system
    consumers:
      - workshop               # evaluate() after every equip/unequip
      - turn-based-combat      # evaluate_silent() once at battle start (no spurious UI emit)
      - workshop-ui            # preview() on hover; subscribes synergy_changed
    adr: docs/architecture/adr-0005-stat-pipeline.md
    signal_signature: "evaluate(parts) — recompute + ALWAYS emit synergy_changed(
      active_synergies: Array[StringName], bonus_block: Dictionary) / evaluate_silent(parts)
      — recompute + cache, no emit / preview(candidate, slot, parts) — pure read-only.
      active_synergies never null; the empty block is a valid zero-bonus state"
    referenced_by:
      - docs/architecture/adr-0005-stat-pipeline.md
      - docs/architecture/adr-0007-tbc-state-machine.md   # TBC calls evaluate_silent() once at BATTLE_INIT (no spurious UI emit)
      - docs/architecture/adr-0008-ui-architecture.md   # Workshop UI calls preview() (pure) + subscribes synergy_changed
    added: 2026-07-14
    revised: ""

  - contract: core_progression_gate
    status: active
    pattern: direct_call       # + owner-declared core_leveled_up signal
    producer: core-progression
    consumers:
      - symbot-assembly        # can_equip on every equip attempt (CP Rule 4 gate)
      - turn-based-combat      # is_build_valid battle-start precondition (AC-TBC-42); battle_ended -> apply_battle_result
      - inventory              # register_core on first-add
      - workshop-ui            # level display, gate tooltips, invalid-build banner
    adr: docs/architecture/adr-0005-stat-pipeline.md
    signal_signature: "register_core(core_instance_id: int) / can_equip(core_instance_id,
      part) -> bool / is_build_valid(build) -> bool / apply_battle_result(outcome, xp_value,
      completion_bonus_xp, is_first_boss_defeat, enemy_level, deployed_symbot_ids)
      # consumes the combat_battle_end payload fields verbatim — host-agnostic (takes
      fields, not a TBC reference) / core_leveled_up(id, old_level, new_level) emitted
      once per gain span"
    referenced_by:
      - docs/architecture/adr-0005-stat-pipeline.md
      - docs/architecture/adr-0007-tbc-state-machine.md   # is_build_valid is TBC's battle-start precondition; the meta-progression subscriber calls apply_battle_result on battle_ended
      - docs/architecture/adr-0008-ui-architecture.md   # Workshop UI queries is_build_valid for the TR-cp-012 invalid-build banner; subscribes core_leveled_up
    added: 2026-07-14
    revised: ""

  - contract: rng_vending
    status: active
    pattern: direct_call       # orchestrators ONLY call the service; gameplay receives seeds/instances as params
    producer: rng-service
    consumers:
      - turn-based-combat      # ADR-0007: next_seed(&"crit") for crit rolls; next_seed(&"ai") to inject into request_move
      - drop-system            # make_rng(&"drop") threaded through the ID-ascending roll loop
      - enemy-ai               # receives the int seed (never the service) — builds a FRESH rng per call
    adr: docs/architecture/adr-0006-rng-service.md
    signal_signature: "next_seed(label: StringName = &\"\") -> int  # fresh int seed for
      build-your-own-per-call consumers (Enemy AI) / make_rng(label: StringName = &\"\") ->
      RandomNumberGenerator  # fresh seeded instance, caller owns stream position (Drop skip-draw
      pity stays synced because the CALLER drives the stream). Both vend off one root; label is
      logged. NO seed param — service is bypassable by construction (tests inject int/stub RNG
      directly). Determinism boundary = the resolution unit; within-engine-build only."
    referenced_by:
      - docs/architecture/adr-0006-rng-service.md
      - docs/architecture/adr-0007-tbc-state-machine.md   # TBC vends next_seed(&"crit") + next_seed(&"ai") ONLY; drop rng is NOT TBC's (Drop resolver owns make_rng(&"drop"))
    added: 2026-07-14
    revised: ""

  - contract: battle_orchestration
    status: active
    pattern: direct_call       # global autoload API — callers invoke methods on the BattleController singleton
    producer: turn-based-combat   # BattleController autoload (slot 11)
    consumers:
      - overworld-navigation   # ScreenManager.enter_battle path ultimately drives start_battle(payload)
      - combat-ui              # submit_action(action) to resume a parked player turn; reads is_battle_active
      - save-load              # is_battle_active() manual-save quiesce gate (ADR-0002 §4)
    adr: docs/architecture/adr-0007-tbc-state-machine.md
    signal_signature: "start_battle(encounter_payload: Dictionary) -> bool  # false + emits
      battle_start_refused(invalid_symbot_ids, offending_parts) when is_build_valid fails for
      any fielded build — no runtime state, no battle_ended / is_battle_active() -> bool  # true
      only across BATTLE_INIT..BATTLE_END; the SaveLoad quiesce gate / submit_action(action) ->
      void  # no-op unless _state == ACTION_PENDING (re-entrancy guard). FSM parks at
      ACTION_PENDING (no await/loop); enemy turns call EnemyAI.request_move(snapshot) synchronously
      through the same _resolve() path. Emits combat_battle_end (battle_ended) synchronously,
      then drops the BattleContext ref."
    referenced_by:
      - docs/architecture/adr-0007-tbc-state-machine.md
      - docs/architecture/adr-0008-ui-architecture.md   # Combat UI calls submit_action(action) + reads is_battle_active; subscribes the battle signals
    added: 2026-07-14
    revised: ""

  - contract: screen_contract
    status: active
    pattern: direct_call       # ScreenManager calls setup(ctx) once at instantiation; views then subscribe owner signals
    producer: presentation     # the Screen base class (extends Control) + the ServiceContext bundle
    consumers:
      - main-menu
      - workshop-ui
      - combat-ui
      - world-map-ui
      - all-screens            # every screen extends Screen and receives the SAME ServiceContext at instantiation
    adr: docs/architecture/adr-0008-ui-architecture.md
    signal_signature: "Screen.setup(ctx: ServiceContext) -> void  # called ONCE by ScreenManager at
      instantiation, before the screen is shown; caches deps + connects owner signals; MUST disconnect
      on NOTIFICATION_EXIT_TREE. ServiceContext (RefCounted) bundles: screens: ScreenManager, build:
      SymbotBuild, synergy: SynergyEvaluator, progression: CoreProgression, log: LogSink. BattleController
      is read as the slot-11 autoload (NOT in the bundle); content via the DB autoloads. A view is a pure
      function of the last signal payload — no _process polling."
    referenced_by:
      - docs/architecture/adr-0008-ui-architecture.md
    added: 2026-07-14
    revised: ""

