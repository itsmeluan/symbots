# ─── FORBIDDEN PATTERNS ──────────────────────────────────────────────────────
# Architecture anti-patterns explicitly banned by accepted ADRs.
# When writing a new ADR, check this list — if the proposed approach matches
# a forbidden pattern, it must be reworked before the ADR can be Accepted.
#
# Register a pattern when an ADR explicitly bans it AND other ADRs might
# unknowingly use it (i.e., it's a tempting but wrong approach for this project).

forbidden_patterns:
  - pattern: live_resource_in_save_snapshot
    status: active
    description: "A save provider's snapshot() must NEVER return a live Godot Resource
      (or a Dictionary/Array containing one). Flatten all state to plain data
      (Dictionary / Array / int / float / String / bool) before it enters serialization."
    why: "Serializing live Resources walks straight into the Godot 4.4/4.5 shallow
      Resource.duplicate() / duplicate_deep() nested-resource footgun and couples the
      on-disk format to in-memory class layout. Plain-data-only is what neutralizes the
      HIGH serialization risk — a single Resource leaking into a snapshot reopens it."
    adr: docs/architecture/adr-0001-save-load.md
    added: 2026-07-13

  - pattern: subscriber_ordering_dependency
    status: active
    description: "No subscriber may depend on running before or after another subscriber
      of the same signal. Every signal payload must be self-sufficient — carry everything
      consumers need so no consumer has to read state another consumer might have already
      mutated. Payload collections are read-only: consumers needing mutation copy first
      via dict.duplicate(true) / array.duplicate(true)."
    why: "Godot invokes connections in connection order, which is boot-order-dependent
      and silently changes when autoloads or scene structure are reordered. An ordering
      dependency works until an unrelated refactor breaks it. (ADR-0002 teardown contract
      rules 3–4.)"
    adr: docs/architecture/adr-0002-event-bus.md
    added: 2026-07-13

  - pattern: global_push_diagnostics
    status: active
    description: "System code (src/) must not call push_warning()/push_error() directly.
      Diagnostics go through the injected LogSink (@abstract class_name LogSink:
      warn(code: StringName, detail: Dictionary) / error(...)). Production sink forwards
      to Godot's console; tests inject a spy sink (preload()-ed, not class_name-declared)."
    why: "Global push_* calls are invisible to unit tests — a formula that push_error()s
      on bad input passes GUT silently. The injected sink makes every diagnostic assertable,
      which the 80% game-logic coverage mandate requires. (Extends ADR-0001 File Rule 7
      project-wide.)"
    adr: docs/architecture/adr-0002-event-bus.md
    added: 2026-07-13

  - pattern: bus_by_default
    status: active
    description: "New cross-system signals default to owner-declared typed signals with
      direct connections. A signal may be added to the EventBus ONLY if it meets an
      ADR-0002 admission criterion: (1) the producer is not a stable boot-time autoload
      (transient/unauthored), or (2) it is a world-state broadcast with an unbounded
      consumer set. Adding a bus signal requires an ADR-0002 amendment."
    why: "A bus that accepts everything degenerates into a global event soup where no one
      can trace who talks to whom. The closed 3-signal MVP roster is only reviewable
      because admission is gated; routing convenience is not a criterion."
    adr: docs/architecture/adr-0002-event-bus.md
    added: 2026-07-13

  - pattern: runtime_content_mutation
    status: active
    description: "Content defs (PartDef, EnemyDef, MoveDef, PassiveDef, ConsumableDef,
      LootNodeDef) and catalogs are frozen shared instances — mutating any field at runtime
      is forbidden, and the ban explicitly covers calling duplicate() or duplicate_deep()
      on any def or catalog. Systems needing mutable working state copy specific fields
      into their own runtime structures (battle snapshot, part instances)."
    why: "Lookups hand out THE shared instance; one mutation corrupts every future reader.
      duplicate() (shallow for nested resources since Godot 4.5) is the trap's disguise:
      a 'copy' of an EnemyDef still shares its BreakRegionDefs, so copy-then-mutate
      silently mutates shared state. (ADR-0003 §4; immutability GUT test is load-bearing.)"
    adr: docs/architecture/adr-0003-content-resources.md
    added: 2026-07-13

  - pattern: content_directory_scanning
    status: active
    description: "No DirAccess directory listing anywhere in the content load path. Content
      ships exclusively through the explicit catalog Resource reference chains resolved by
      ResourceLoader."
    why: "In exported PCKs, .tres resources get companion .remap stubs; DirAccess listing
      returns only stub names, so *.tres scans work in-editor and find NOTHING post-export —
      a works-in-editor/fails-on-iOS failure class. ResourceLoader.load() resolves remaps
      transparently, which is why catalogs are export-safe. (ADR-0003 §2; enforced by a
      static grep test.)"
    adr: docs/architecture/adr-0003-content-resources.md
    added: 2026-07-13

  - pattern: content_enum_reordering
    status: active
    description: "Enums used in content def @export fields declare explicit integer values
      starting at 1 (0 = reserved/invalid) and are APPEND-ONLY — never reorder, insert,
      or renumber existing values."
    why: ".tres files store enum values as raw integers, not names. Inserting or reordering
      a value silently re-labels every already-authored entry (a part authored as ARMOR
      becomes WEAPON) with no load error — content corruption invisible until gameplay.
      (ADR-0003 §1.)"
    adr: docs/architecture/adr-0003-content-resources.md
    added: 2026-07-13

  - pattern: autoload_ready_work
    status: active
    description: "Autoloads are thin hosts: no I/O, no catalog loads, no signal connections,
      no cross-autoload reads in _ready. All initialization is driven explicitly by the
      BootScreen sequencer, in code, in order."
    why: "Work in autoload _ready makes boot order an invisible editor setting, gives
      failures no scene tree to show an error on (black-screen death), and makes the
      sequence untestable without replicating the autoload environment. Thin hosts keep
      every piece of logic constructible in GUT and make autoload list order immaterial
      to correctness. (ADR-0004 §1; enforced by review checklist + grep for I/O in
      autoload scripts.)"
    adr: docs/architecture/adr-0004-scene-boot.md
    added: 2026-07-13

  - pattern: unowned_scene_transition
    status: active
    description: "No system, screen, or UI code may perform a screen transition itself:
      no change_scene_to_packed()/change_scene_to_file(), no add_child()/free()/
      queue_free() of screen scenes outside ScreenManager, no get_parent() climbing to
      reach the manager. Screens request transitions on their injected ScreenManager
      reference; Battle teardown in particular is queue_free() by ScreenManager only,
      never free()."
    why: "A single transition owner makes the legal screen flow equal to ScreenManager's
      method list — illegal transitions don't exist rather than being checked. Self-service
      swaps reintroduce the destroyed-Overworld problem (position/zone-state loss) and
      free() during the synchronous encounter_resolved cascade is a use-after-free.
      (ADR-0004 §2–3; enforced by static grep test for change_scene_to and screen free().)"
    adr: docs/architecture/adr-0004-scene-boot.md
    added: 2026-07-13

  - pattern: inline_stat_composition
    status: active
    description: "No code may reimplement SYN-F4 (effective stat = maxi(0, final + synergy
      + aura)) outside StatMath.effective_stat / CombatantSnapshot.effective_stat. TBC
      damage resolution, initiative, and every UI display MUST call the single composition
      point."
    why: "Two implementations of one formula is exactly how the MOVE-F1 preview seam shipped
      through a full approval (design-review 2026-07-12): copies drift the first time one is
      patched. Review aid: grep for maxi(0,/max(0, near 'synergy' outside the two legal
      sites. (ADR-0005 §Layer 3.)"
    adr: docs/architecture/adr-0005-stat-pipeline.md
    added: 2026-07-14

  - pattern: mid_battle_stat_recompute
    status: active
    description: "After BATTLE_INIT builds the CombatantSnapshots, no battle-scope code path
      may call StatPipeline.derive or SynergyEvaluator.evaluate/evaluate_silent, and battle
      code must never hold a reference into the live SymbotBuild or the evaluator cache.
      Battle reads the frozen snapshot only; in-battle stat changes are TBC-owned modifiers
      layered ON TOP of effective_stat()."
    why: "The GDD freeze (TBC Rule 2) is a behavioral contract, not an engine lock — one
      mid-battle recompute re-couples battle state to Workshop state and voids the snapshot's
      isolation guarantees. Enforced by the isolation GUT test + the Workshop equip lockout
      while is_battle_active (Synergy DCO-8). (ADR-0005 §Layer 3.)"
    adr: docs/architecture/adr-0005-stat-pipeline.md
    added: 2026-07-14

  - pattern: global_rng_access
    status: active
    description: "No gameplay or formula code may call @GlobalScope randf()/randi()/
      randi_range()/randf_range() or randomize(). All randomness comes from an injected seed:int
      or RandomNumberGenerator instance, ultimately vended by RngService (interface rng_vending).
      RngService.init() is the ONLY sanctioned randomize() call in the project."
    why: "A global draw is un-seedable and un-stubbable — it silently destroys per-resolution
      determinism (Enemy AI's pure-function contract, enemy-ai Rule 3) and makes every seeded
      AC (AC-DS-04, AC-EAI-06) unwritable. Enforced by a static grep test over src/ for
      bare rand*() calls that are not method calls on an injected RandomNumberGenerator.
      (ADR-0006.)"
    adr: docs/architecture/adr-0006-rng-service.md
    added: 2026-07-14

  - pattern: rng_service_in_formula_code
    status: active
    description: "Pure formula core (src/core/) and gameplay resolvers must NEVER reference the
      RngService autoload symbol. Randomness arrives strictly as a parameter (seed: int or
      rng: RandomNumberGenerator). Only orchestrators — BootScreen, TBC (ADR-0007), the Drop
      resolver's owner — are permitted to call RngService.next_seed / make_rng."
    why: "A formula that reaches for the autoload becomes impure and untestable, defeating the
      DI/coverage mandate and ADR-0005's pure-core stance. Keeping the service at the
      orchestrator boundary is what lets every formula be GUT-tested with an injected seed.
      (ADR-0006 §Layer 2; mirrors autoload_ready_work / stat_formula_home.)"
    adr: docs/architecture/adr-0006-rng-service.md
    added: 2026-07-14

  - pattern: persistent_shared_rng_across_calls
    status: active
    description: "A pure-function resolver (Enemy AI request_move, and any future stateless
      roller) must rebuild its RandomNumberGenerator from the injected seed on EVERY call and
      must not cache or reuse an instance between calls. Threading a long-lived rng through
      successive pure-function calls is forbidden."
    why: "A reused instance carries stream state between calls, so identical (state, profile,
      seed) inputs yield DIFFERENT outputs depending on call history — exactly the cross-call
      sequence-consumption hazard enemy-ai Rule 3 forbids, and it breaks the pure-function
      guarantee the seeded ACs rely on. (ADR-0006; enemy-ai Rule 3 / AC-EAI-06.)"
    adr: docs/architecture/adr-0006-rng-service.md
    added: 2026-07-14

  - pattern: battle_state_on_transient_node
    status: active
    description: "is_battle_active and the battle FSM (_state) must live on the persistent
      BattleController autoload (slot 11), NEVER on the Battle scene node or any transient
      screen. Per-battle mutable state lives in a RefCounted BattleContext the controller
      owns, not on a Node in the scene tree."
    why: "The Battle screen is queue_free()d at teardown (ADR-0004 §3); a query against a
      state flag on that node races the is_queued_for_deletion() window and returns garbage
      exactly when SaveLoad asks 'may I save?'. The always-queryable authority must outlive
      any single battle's scene. (ADR-0007; ADR-0002 §4 is_battle_active contract.)"
    adr: docs/architecture/adr-0007-tbc-state-machine.md
    added: 2026-07-14

  - pattern: battle_context_leak_past_teardown
    status: active
    description: "No code may retain a reference to the BattleContext (or objects that
      transitively hold it) past the battle_ended emit() cascade. Subscribers read what they
      need from the self-sufficient payload and via getters DURING the synchronous emit — they
      never store the context. CombatantSnapshots inside a BattleContext must not back-reference
      the context (no RefCounted reference cycle)."
    why: "GDScript has no cycle collector: a retained ref — a UI field, or a snapshot->context
      back-reference — silently keeps the whole battle alive for the process lifetime, and
      defeats the single-teardown-moment guarantee. A WeakRef teardown test asserts the context
      is actually freed, not merely dereferenced. (ADR-0007; ADR-0002 synchronous-teardown.)"
    adr: docs/architecture/adr-0007-tbc-state-machine.md
    added: 2026-07-14

  - pattern: coroutine_park_across_action
    status: active
    description: "The battle FSM must NOT await across ACTION_PENDING (no `var action = await
      ...`, no polling loop). It parks by setting _state and returning; a player turn resumes
      via BattleController.submit_action(action) (guarded no-op unless _state == ACTION_PENDING),
      an enemy turn via a synchronous EnemyAI.request_move(snapshot) fed through the same
      _resolve() path."
    why: "A coroutine suspended across the park holds live state through teardown, the save
      quiesce point, and re-entrancy — a mid-await save or queue_free is a use-after-free class.
      The event-driven park keeps every transition synchronous and each stop-point testable.
      (ADR-0007 Decision §4.)"
    adr: docs/architecture/adr-0007-tbc-state-machine.md
    added: 2026-07-14

  - pattern: view_state_polling
    status: active
    description: "A view (Screen or child Control) must NOT poll model state in _process/
      _physics_process. Views subscribe to owner signals (stats_changed, synergy_changed,
      core_leveled_up, the battle signals, zone_states_changed) and render as a pure function
      of the last payload received. State is pushed by signal, never pulled per-frame."
    why: "Per-frame polling burns the 16.6 ms budget, fights the 200 draw-call target, and
      re-reads state the self-sufficient-signal contract already delivers (ADR-0002). Signal-driven
      views update only on change. (ADR-0008 Decision §2.)"
    adr: docs/architecture/adr-0008-ui-architecture.md
    added: 2026-07-14

  - pattern: undisconnected_view_subscription
    status: active
    description: "A screen connecting to a signal on a persistent owner (CoreProgression,
      SynergyEvaluator, or any object outliving the screen) MUST disconnect on
      NOTIFICATION_EXIT_TREE. The Screen base's _connect_owned(sig, callable) helper does this
      automatically and binds named-method Callables (Callable(self, \"_on_x\")), NEVER lambdas
      that close over self/ctx."
    why: "Godot 4 does NOT reliably auto-drop a connection when the subscriber is freed
      (specialist-confirmed on 4.6): the persistent owner then emits into a freed node — a crash
      or 'call on freed object' error. A closure capturing ctx also silently extends the
      ServiceContext lifetime past the screen. A leak test frees a screen and asserts zero
      dangling owner connections. (ADR-0008 Decision §2 / Risks.)"
    adr: docs/architecture/adr-0008-ui-architecture.md
    added: 2026-07-14

  - pattern: hover_only_affordance
    status: active
    description: "No interactive affordance may be discoverable or triggerable ONLY via hover
      (mouse_entered / tooltip) or ONLY via keyboard/gamepad focus (grab_focus). Every action
      fires from the unified press release that both a mouse click and a touch tap raise; hover
      and tooltips are enhancement-only. Interactive Controls set custom_minimum_size >=
      Vector2(44, 44) (virtual px at the reference resolution — verify against the content scale)."
    why: "Touch has no hover, and in Godot 4.6 mouse/touch focus is SEPARATE from keyboard/gamepad
      focus — grab_focus() drives keyboard/gamepad focus only, so a keyboard-only or hover-only
      path is invisible/unusable on iOS. The dual-input GUT test must synthesize InputEventScreenTouch
      (not InputEventMouseButton, which mouse-emulation would satisfy). (ADR-0008 Decision §3;
      TR-ui-001/002.)"
    adr: docs/architecture/adr-0008-ui-architecture.md
    added: 2026-07-14

  - pattern: ui_unique_material_batch_break
    status: active
    description: "UI nodes must not carry per-widget unique material/shader instances. Styling
      goes through one shared project Theme (assets/ui/theme.tres) with shared StyleBoxes. Also
      watch three further batch-breakers: clip_contents = true (isolates a CanvasItem), nested
      CanvasLayer nodes (each starts a new draw layer), and per-frame RichTextLabel/BBCode updates."
    why: "Each unique material breaks 2D CanvasItem batching, and every break adds draw calls
      against the 200 budget (TR-perf-003). A shared Theme keeps widgets batchable; the per-screen
      draw-call smoke check is the gate. (ADR-0008 Decision §5.)"
    adr: docs/architecture/adr-0008-ui-architecture.md
    added: 2026-07-14

# Example:
#
# forbidden_patterns:
#   - pattern: autoload_singleton_coupling
