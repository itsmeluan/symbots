# ─── PERFORMANCE BUDGETS ──────────────────────────────────────────────────────
# Frame time allocations per system, against a defined total frame budget.
# Conflicts: allocations that sum to more than the total budget = unshippable.
#
# Register a budget when an ADR explicitly claims a frame time allocation.
# The registry lets /architecture-review verify the total doesn't exceed the target.

performance_budgets: []

# Example:
#
# performance_budgets:
#   - target_fps: 60
#     total_frame_budget_ms: 16.6
#     platform: PC             # PC | Console | Mobile | All
#     adr: docs/architecture/adr-0000-performance-targets.md
#     added: 2026-03-26
#     revised: ""
#
#   - system: combat
#     status: active
#     budget_ms: 2.0
#     adr: docs/architecture/adr-0003-combat-system.md
#     notes: "Includes physics queries, hitbox evaluation, and damage calculation"
#     referenced_by:
#       - docs/architecture/adr-0003-combat-system.md
#     added: 2026-03-26
#     revised: ""


# ─── API DECISIONS ───────────────────────────────────────────────────────────
# Which engine APIs are chosen for which purpose across the project.
# Conflicts: two ADRs using different APIs for the same purpose = inconsistent
# implementation that breaks when one system expects the other's API.
#
# Register an API decision when the choice is non-obvious and other ADRs might
# make a different choice for the same purpose without knowing this was decided.

api_decisions:
  - purpose: save_serialization
    status: active
    api: "JSON.stringify(envelope, \"\\t\") / JSON.parse_string()"
    not:                       # explicitly banned for save serialization
      - var_to_bytes / bytes_to_var   # opaque, undebuggable, brittle on schema change
      - ResourceSaver / .tres          # couples on-disk format to class layout; hits 4.4/4.5 Resource footguns
    adr: docs/architecture/adr-0001-save-load.md
    reason: "Human-readable + retune-safe + sidesteps the Godot 4.6 Resource-serialization HIGH risk. NOTE: JSON parses all numbers as float — int source facts must be int()-cast on restore."
    referenced_by:
      - docs/architecture/adr-0001-save-load.md
      - docs/architecture/adr-0003-content-resources.md   # JSON is player-data-only; content is .tres — the two must not be conflated
    added: 2026-07-13
    revised: ""

  - purpose: content_authoring
    status: active
    api: "Typed .tres Resource entries (class_name def scripts, @export typed fields incl.
      Dictionary[StringName, int] — VERIFICATION GATE: .tres round-trip must pass before
      content authoring begins) + one explicit catalog Resource per DB (Array[XDef] manifest).
      Loading = ResourceLoader.load of 6 catalog files; content enums explicit-from-1.
      Validation: single ContentValidator, CI-blocking headless GUT suite + dev-boot
      fail-loud via LogSink (release builds skip)."
    not:                       # explicitly banned for content authoring/loading
      - "JSON content files — inspector authoring lost, parse layer, all-floats casts (JSON is for SAVES, ADR-0001)"
      - "generic Dictionary catalogs — no compile-time field checking"
      - "directory-scan loading — DirAccess listing breaks on .remap stubs in exported PCKs"
      - "monolithic single-file catalogs — merge conflicts concentrate in one file"
    adr: docs/architecture/adr-0003-content-resources.md
    reason: "Read-only content never re-serializes at runtime, so ADR-0001's Resource-save
      footguns don't apply; the catalog IS the reviewable manifest of what ships; typed defs
      make the compiler enforce half the schema contract."
    referenced_by:
      - docs/architecture/adr-0003-content-resources.md
    added: 2026-07-13
    revised: ""

  - purpose: cross_system_eventing
    status: active
    api: "Hybrid: owner-declared typed signals + direct connections by default;
      thin stateless EventBus autoload (signal declarations ONLY) for cross-layer
      broadcasts meeting the ADR-0002 admission criteria (transient/unauthored
      producer OR unbounded consumer set). Closed MVP bus roster: encounter_resolved,
      zone_states_changed, zone_entered."
    not:                       # explicitly banned for cross-system eventing
      - "string-based connect (obj.connect(\"signal_name\", ...)) — deprecated; typed Signal.connect() only"
      - "CONNECT_DEFERRED outside the Save/Load autosave triggers — synchronous emit is the contract"
      - "string-topic pub/sub (emit(\"topic\", payload)) — no compile-time checking, unreviewable surface"
    adr: docs/architecture/adr-0002-event-bus.md
    reason: "Typed direct connections keep contracts compiler-visible and testable;
      the bus stays a closed, reviewable 3-signal surface instead of a global
      anything-goes channel. EventBus must be FIRST in the autoload order (→ ADR-0004)."
    referenced_by:
      - docs/architecture/adr-0002-event-bus.md
      - docs/architecture/adr-0004-scene-boot.md   # EventBus-first constraint discharged (autoload #1 of 10)
      - docs/architecture/adr-0008-ui-architecture.md   # World Map UI subscribes zone_states_changed for the TR-zwm-009 {zone_id, from_state, to_state} transitions array
    added: 2026-07-13
    revised: ""

  - purpose: boot_initialization
    status: active
    api: "Explicit BootScreen sequencer under the persistent Game.tscn root: run_boot()
      drives catalogs (6× load_catalog) → ContentValidator gate (debug builds) →
      RngService.init() → save-provider registration → autosave CONNECT_DEFERRED
      connections → Main Menu. Every fatal step routes to a BootError screen via
      LogSink. Autoload roster, fixed order of 11: EventBus, Log, PartDB, EnemyDB,
      MoveDB, PassiveDB, ConsumableDB, WorldLootDB, RngService, SaveLoad, BattleController
      — all thin hosts (BattleController added by ADR-0007 as slot 11, the combat orchestrator;
      inert _ready — its FSM is driven only by start_battle(), never by _ready). Save restore
      happens at Main Menu Continue, NOT during boot; New Game
      runs the same Phase 2 rederive() as 'restore from nothing'."
    not:                       # explicitly banned for boot/initialization
      - "autoload _ready chain as boot driver — ordering invisible to review, black-screen death on failure, untestable"
      - "change_scene_to_packed()/change_scene_to_file() — the root is permanent; ScreenManager owns all transitions"
      - "eager catalog loading in DB autoload _ready — see forbidden pattern autoload_ready_work"
    adr: docs/architecture/adr-0004-scene-boot.md
    reason: "Boot is the one sequence that must be reviewable, testable, and fail-visible.
      TR-ep-004 (restore before derive) is satisfied structurally: derivation is a phase
      gate, gameplay screens unreachable before it."
    referenced_by:
      - docs/architecture/adr-0004-scene-boot.md
      - docs/architecture/adr-0005-stat-pipeline.md   # BalanceConfig load added to boot step 2; Layer-2 owners constructed at boot step 5
      - docs/architecture/adr-0006-rng-service.md     # RngService.init() at boot step 4 (already named in the roster/sequence)
      - docs/architecture/adr-0007-tbc-state-machine.md   # roster amended 10 -> 11: BattleController appended as slot 11 (inert _ready)
    added: 2026-07-13
    revised: "2026-07-14"  # ADR-0007 roster amendment (fixed order of 10 -> 11; BattleController added)

  - purpose: stat_formula_home
    status: active
    api: "Pure static-function formula core in src/core/stats/ (StatMath, StatPipeline,
      DamageFormula, SynergyMath, ProgressionMath — no state, no signals, no autoload
      registration) + thin stateful owners as DI-constructed RefCounted (SymbotBuild,
      SynergyEvaluator, CoreProgression), built by BootScreen step 5 and handed to screens
      via ScreenManager injection. All constructors take (cfg: BalanceConfig, log: LogSink)."
    not:                       # explicitly banned as homes for stat/formula logic
      - "stat/synergy/progression service autoloads — defeat the DI/coverage mandate. CARVE-OUT (ADR-0007): this ban covers FORMULA-OWNER services only. The combat ORCHESTRATOR (BattleController, slot 11) is a permitted stateful autoload — it owns battle FSM lifecycle + is_battle_active, holds NO stat/synergy/progression math, and reaches formulas only through the same injected pure-core functions everyone else uses."
      - "Node-based stat components — no per-entity scene exists; scene-tree lifecycle risk for pure data math"
    adr: docs/architecture/adr-0005-stat-pipeline.md
    reason: "Every formula is GUT-testable against the GDDs' discriminating worked examples
      with a spy sink and a test config; consumers are few and known (Workshop, TBC, UI), so
      injection is cheap; honors the fixed-roster and thin-host stances without amendment."
    referenced_by:
      - docs/architecture/adr-0005-stat-pipeline.md
      - docs/architecture/adr-0007-tbc-state-machine.md   # carve-out: combat orchestrator autoload is NOT a formula-owner service
    added: 2026-07-14
    revised: "2026-07-14"  # ADR-0007 carve-out for the combat orchestrator autoload

  - purpose: tuning_constants
    status: active
    api: "Single BalanceConfig typed Resource (class_name BalanceConfig extends Resource),
      authored as one .tres (assets/data/balance_config.tres), loaded by BootScreen at boot
      step 2 alongside the six catalogs (fatal-on-missing -> BootError), validated by a
      ContentValidator section (xp_thresholds strictly increasing, bench_xp_share power-of-2,
      chassis_modifiers keys in the canonical 11), constructor-injected into every Layer-1/2
      user."
    not:                       # explicitly banned for tunable gameplay values
      - "UPPER_SNAKE_CASE consts beside formulas — violates the data-driven standard. EXCEPTION: EPSILON = 0.0001 stays a StatMath const (DF-1: 'not a tuning knob; fixed implementation constant')"
      - "per-system tuning .tres files — multiplies boot steps; cross-system constants (synergy budgets span Synergy + DF-1 + validation) have no home"
    adr: docs/architecture/adr-0005-stat-pipeline.md
    reason: "One reviewable balance diff, one boot step, one validator section. Typed-dict
      .tres tables share ADR-0003's open round-trip verification gate; the nested tables
      (chassis_modifiers, type_chart) need their fallback form decided if the gate fails."
    referenced_by:
      - docs/architecture/adr-0005-stat-pipeline.md
    added: 2026-07-14
    revised: ""

  - purpose: rng_source
    status: active
    api: "Single RngService autoload (slot 9) vending off one root RandomNumberGenerator
      (PCG32). next_seed(label) -> int and make_rng(label) -> RandomNumberGenerator. Root
      seeded at BootScreen run_boot() step 4: root_seed==0 -> randomize() (OS entropy,
      production); nonzero -> deterministic root (CI/soak/whole-session repro). Effective root
      seed LOGGED once via LogSink, never persisted. Determinism boundary = the resolution unit
      (one request_move / one drop pass / one crit roll); reproducible within one engine build."
    not:                       # explicitly banned for randomness
      - "@GlobalScope randf()/randi()/randi_range()/randf_range() in gameplay or formula code — see forbidden global_rng_access"
      - "a long-lived shared RandomNumberGenerator that many systems draw from ad hoc — breaks per-resolution determinism + Drop stream-sync semantics"
      - "persisting a master seed / RNG stream state to the save file — contradicts ADR-0001 (pity persists, RNG state does not); enables save-scum"
    adr: docs/architecture/adr-0006-rng-service.md
    reason: "Two consumers demand incompatible shapes (Enemy AI wants an int seed to build its
      own fresh rng per call; Drop wants a threaded instance whose stream position is load-bearing).
      One vending service satisfies both, keeps formula code pure/injectable (every seeded AC
      writable), and logs a coarse root seed for bug repro without persisting anything. Godot RNG
      seed->sequence is version-fragile (verify pinned seeds on engine bump, AC-EAI-06)."
    referenced_by:
      - docs/architecture/adr-0006-rng-service.md
    added: 2026-07-14
    revised: ""

