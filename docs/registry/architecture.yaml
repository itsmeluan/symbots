# ─── PERFORMANCE BUDGETS ──────────────────────────────────────────────────────
# Frame time allocations per system, against a defined total frame budget.
# Conflicts: allocations that sum to more than the total budget = unshippable.
#
# Register a budget when an ADR explicitly claims a frame time allocation.
# The registry lets /architecture-review verify the total doesn't exceed the target.

performance_budgets: []

# Example:
#
# performance_budgets:
#   - target_fps: 60
#     total_frame_budget_ms: 16.6
#     platform: PC             # PC | Console | Mobile | All
#     adr: docs/architecture/adr-0000-performance-targets.md
#     added: 2026-03-26
#     revised: ""
#
#   - system: combat
#     status: active
#     budget_ms: 2.0
#     adr: docs/architecture/adr-0003-combat-system.md
#     notes: "Includes physics queries, hitbox evaluation, and damage calculation"
#     referenced_by:
#       - docs/architecture/adr-0003-combat-system.md
#     added: 2026-03-26
#     revised: ""


# ─── API DECISIONS ───────────────────────────────────────────────────────────
# Which engine APIs are chosen for which purpose across the project.
# Conflicts: two ADRs using different APIs for the same purpose = inconsistent
# implementation that breaks when one system expects the other's API.
#
# Register an API decision when the choice is non-obvious and other ADRs might
# make a different choice for the same purpose without knowing this was decided.

api_decisions:
  - purpose: save_serialization
    status: active
    api: "JSON.stringify(envelope, \"\\t\") / JSON.parse_string()"
    not:                       # explicitly banned for save serialization
      - var_to_bytes / bytes_to_var   # opaque, undebuggable, brittle on schema change
      - ResourceSaver / .tres          # couples on-disk format to class layout; hits 4.4/4.5 Resource footguns
    adr: docs/architecture/adr-0001-save-load.md
    reason: "Human-readable + retune-safe + sidesteps the Godot 4.6 Resource-serialization HIGH risk. NOTE: JSON parses all numbers as float — int source facts must be int()-cast on restore."
    referenced_by:
      - docs/architecture/adr-0001-save-load.md
    added: 2026-07-13
    revised: ""

  - purpose: cross_system_eventing
    status: active
    api: "Hybrid: owner-declared typed signals + direct connections by default;
      thin stateless EventBus autoload (signal declarations ONLY) for cross-layer
      broadcasts meeting the ADR-0002 admission criteria (transient/unauthored
      producer OR unbounded consumer set). Closed MVP bus roster: encounter_resolved,
      zone_states_changed, zone_entered."
    not:                       # explicitly banned for cross-system eventing
      - "string-based connect (obj.connect(\"signal_name\", ...)) — deprecated; typed Signal.connect() only"
      - "CONNECT_DEFERRED outside the Save/Load autosave triggers — synchronous emit is the contract"
      - "string-topic pub/sub (emit(\"topic\", payload)) — no compile-time checking, unreviewable surface"
    adr: docs/architecture/adr-0002-event-bus.md
    reason: "Typed direct connections keep contracts compiler-visible and testable;
      the bus stays a closed, reviewable 3-signal surface instead of a global
      anything-goes channel. EventBus must be FIRST in the autoload order (→ ADR-0004)."
    referenced_by:
      - docs/architecture/adr-0002-event-bus.md
    added: 2026-07-13
    revised: ""

# Example:
#
# api_decisions:
#   - purpose: physics_raycast
#     status: active
#     api: PhysicsServer3D.space_get_direct_state()
#     not: RayCast3D node     # explicitly banned for this purpose
#     adr: docs/architecture/adr-0002-physics-architecture.md
#     reason: "Direct server calls avoid per-frame node overhead; 3× faster in profiling"
#     referenced_by:
#       - docs/architecture/adr-0002-physics-architecture.md
#       - docs/architecture/adr-0003-combat-system.md
#     added: 2026-03-26
#     revised: ""


# ─── FORBIDDEN PATTERNS ──────────────────────────────────────────────────────
# Architecture anti-patterns explicitly banned by accepted ADRs.
# When writing a new ADR, check this list — if the proposed approach matches
# a forbidden pattern, it must be reworked before the ADR can be Accepted.
#
# Register a pattern when an ADR explicitly bans it AND other ADRs might
# unknowingly use it (i.e., it's a tempting but wrong approach for this project).

forbidden_patterns:
  - pattern: live_resource_in_save_snapshot
    status: active
    description: "A save provider's snapshot() must NEVER return a live Godot Resource
      (or a Dictionary/Array containing one). Flatten all state to plain data
      (Dictionary / Array / int / float / String / bool) before it enters serialization."
    why: "Serializing live Resources walks straight into the Godot 4.4/4.5 shallow
      Resource.duplicate() / duplicate_deep() nested-resource footgun and couples the
      on-disk format to in-memory class layout. Plain-data-only is what neutralizes the
      HIGH serialization risk — a single Resource leaking into a snapshot reopens it."
    adr: docs/architecture/adr-0001-save-load.md
    added: 2026-07-13

  - pattern: subscriber_ordering_dependency
    status: active
    description: "No subscriber may depend on running before or after another subscriber
      of the same signal. Every signal payload must be self-sufficient — carry everything
      consumers need so no consumer has to read state another consumer might have already
      mutated. Payload collections are read-only: consumers needing mutation copy first
      via dict.duplicate(true) / array.duplicate(true)."
    why: "Godot invokes connections in connection order, which is boot-order-dependent
      and silently changes when autoloads or scene structure are reordered. An ordering
      dependency works until an unrelated refactor breaks it. (ADR-0002 teardown contract
      rules 3–4.)"
    adr: docs/architecture/adr-0002-event-bus.md
    added: 2026-07-13

  - pattern: global_push_diagnostics
    status: active
    description: "System code (src/) must not call push_warning()/push_error() directly.
      Diagnostics go through the injected LogSink (@abstract class_name LogSink:
      warn(code: StringName, detail: Dictionary) / error(...)). Production sink forwards
      to Godot's console; tests inject a spy sink (preload()-ed, not class_name-declared)."
    why: "Global push_* calls are invisible to unit tests — a formula that push_error()s
      on bad input passes GUT silently. The injected sink makes every diagnostic assertable,
      which the 80% game-logic coverage mandate requires. (Extends ADR-0001 File Rule 7
      project-wide.)"
    adr: docs/architecture/adr-0002-event-bus.md
    added: 2026-07-13

  - pattern: bus_by_default
    status: active
    description: "New cross-system signals default to owner-declared typed signals with
      direct connections. A signal may be added to the EventBus ONLY if it meets an
      ADR-0002 admission criterion: (1) the producer is not a stable boot-time autoload
      (transient/unauthored), or (2) it is a world-state broadcast with an unbounded
      consumer set. Adding a bus signal requires an ADR-0002 amendment."
    why: "A bus that accepts everything degenerates into a global event soup where no one
      can trace who talks to whom. The closed 3-signal MVP roster is only reviewable
      because admission is gated; routing convenience is not a criterion."
    adr: docs/architecture/adr-0002-event-bus.md
    added: 2026-07-13

